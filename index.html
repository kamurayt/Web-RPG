<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Chronicles of Fate</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
:root{
  --bg:#0f1923;--bg2:#162030;--bg3:#1c2a3a;--bg4:#223040;
  --panel:#1a2535;--panel2:#1e2d40;
  --border:#2a3f55;--border2:#3a5570;--border3:#4a6a88;
  --gold:#e8b84c;--gold2:#f5d068;--gold3:#fff8e0;
  --red:#d94f4f;--red2:#f07070;
  --blue:#3a8fd4;--blue2:#5aafee;--blue3:#90d0ff;
  --green:#3aaa60;--green2:#55cc80;--green3:#88eeb0;
  --purple:#8844cc;--purple2:#aa66ee;--purple3:#cc99ff;
  --cyan:#22c0d8;--cyan2:#44ddf0;
  --orange:#e07030;--orange2:#f09050;
  --text:#cce0f0;--text2:#8ab0cc;--text3:#4a7090;
  --stamina:#f0b030;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;
  min-height:100vh;display:flex;justify-content:center;overflow-x:hidden;}
#app{width:390px;max-width:100vw;min-height:100vh;display:flex;flex-direction:column;
  background:linear-gradient(160deg,#0f1923 0%,#12202e 60%,#0f1d2a 100%);
  box-shadow:0 0 40px rgba(0,0,0,.6);}

/* ── TOPBAR ── */
#topbar{display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px 6px;
  background:linear-gradient(180deg,#0a1520 0%,#0f1d2c 100%);
  border-bottom:1px solid var(--border2);
  position:sticky;top:0;z-index:100;flex-shrink:0;}
#char-mini{display:flex;align-items:center;gap:8px;}
#char-icon{width:34px;height:34px;border-radius:8px;background:var(--bg3);
  border:1px solid var(--border3);display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 0 8px rgba(58,143,212,.2);}
#char-name{font-family:'Cinzel',serif;font-size:12px;color:var(--gold2);font-weight:600;line-height:1.2;}
#char-class{font-size:10px;color:var(--text2);}
#top-stats{display:flex;gap:8px;align-items:center;}
.top-stat{display:flex;flex-direction:column;align-items:center;gap:1px;}
.top-stat-bar{width:48px;height:4px;background:rgba(0,0,0,.4);border-radius:2px;overflow:hidden;}
.top-stat-fill{height:100%;border-radius:2px;transition:width .4s;}
.tsf-hp{background:linear-gradient(90deg,#c03030,#e85050);}
.tsf-st{background:linear-gradient(90deg,#c08020,#f0b030);}
.top-stat-label{font-size:7px;color:var(--text3);letter-spacing:.5px;}
.coins-display{font-size:12px;font-weight:700;color:var(--gold2);}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;padding:10px;position:relative;}
#content::-webkit-scrollbar{width:3px;}
#content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── NAV ── */
#nav{display:grid;grid-template-columns:repeat(5,1fr);flex-shrink:0;
  background:#0a1520;border-top:1px solid var(--border2);}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:7px 4px;cursor:pointer;transition:all .15s;
  border:none;background:transparent;color:var(--text3);
  font-family:'Noto Sans JP',sans-serif;font-size:8px;}
.nav-btn.active{color:var(--blue2);background:rgba(58,143,212,.08);}
.nav-btn:hover:not(.active){color:var(--text2);}
.nav-icon{font-size:18px;}
.nav-btn.active .nav-icon{filter:drop-shadow(0 0 4px var(--blue2));}

/* ── PANELS ── */
.panel{background:var(--panel2);border:1px solid var(--border);border-radius:10px;
  padding:12px;margin-bottom:8px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--border2),transparent);}
.panel-title{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);
  letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.panel-title::after{content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--border2),transparent);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:7px 14px;border-radius:7px;border:none;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;
  transition:all .15s;letter-spacing:.3px;}
.btn-gold{background:linear-gradient(135deg,#9a6820,#c9953c,#e8c060);color:#0a0800;
  box-shadow:0 2px 8px rgba(200,150,50,.3);}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-blue{background:linear-gradient(135deg,#1a3f70,#2a6ab0,#3a8fd4);color:#fff;
  box-shadow:0 2px 8px rgba(58,143,212,.3);}
.btn-blue:hover{filter:brightness(1.1);}
.btn-green{background:linear-gradient(135deg,#1a5030,#2a8048,#3aaa60);color:#fff;}
.btn-red{background:linear-gradient(135deg,#6a1818,#a83030,#d44848);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{border-color:var(--border3);color:var(--text);}
.btn-cyan{background:linear-gradient(135deg,#0a4858,#1880a0,#22c0d8);color:#fff;}
.btn-sm{padding:4px 9px;font-size:10px;}
.btn-xs{padding:3px 7px;font-size:9px;}
.btn-full{width:100%;}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;filter:none!important;}

/* ── TITLE ── */
#screen-title{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:95vh;padding:24px;text-align:center;}
.game-logo{font-family:'Cinzel',serif;font-size:30px;color:var(--gold2);
  text-shadow:0 0 30px rgba(232,184,76,.4);font-weight:700;line-height:1.3;margin-bottom:4px;}
.game-subtitle{font-size:11px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:36px;}
.title-btn-group{display:flex;flex-direction:column;gap:10px;width:200px;}

/* ── CLASS CARDS ── */
.class-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.class-card{background:var(--bg3);border:1px solid var(--border);border-radius:9px;
  padding:10px;cursor:pointer;transition:all .18s;text-align:center;}
.class-card:hover,.class-card.selected{border-color:var(--blue2);background:rgba(58,143,212,.06);}
.class-card.selected{box-shadow:0 0 12px rgba(58,143,212,.25);}
.class-icon{font-size:26px;margin-bottom:3px;}
.class-name{font-family:'Cinzel',serif;font-size:11px;color:var(--blue2);margin-bottom:3px;}
.class-desc{font-size:9px;color:var(--text3);line-height:1.4;}
.class-tags{display:flex;gap:3px;justify-content:center;margin-top:4px;flex-wrap:wrap;}
.tag{font-size:7px;padding:1px 4px;border-radius:3px;font-weight:700;letter-spacing:.3px;}
.tag-str{background:rgba(209,79,79,.2);color:var(--red2);}
.tag-mag{background:rgba(90,175,238,.2);color:var(--blue2);}
.tag-heal{background:rgba(58,170,96,.2);color:var(--green2);}
.tag-agi{background:rgba(170,102,238,.2);color:var(--purple2);}
.tag-luck{background:rgba(232,184,76,.2);color:var(--gold2);}

/* ── STAT ROWS ── */
.stat-row{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.stat-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0;}
.stat-name{font-size:10px;color:var(--text2);width:30px;flex-shrink:0;font-weight:700;}
.stat-bar-wrap{flex:1;height:7px;background:rgba(0,0,0,.4);border-radius:4px;overflow:hidden;
  border:1px solid rgba(255,255,255,.06);}
.stat-bar-fill{height:100%;border-radius:4px;transition:width .4s;}
.sbar-hp {background:linear-gradient(90deg,#a02020,#e04040);}
.sbar-atk{background:linear-gradient(90deg,#a06020,#e09030);}
.sbar-def{background:linear-gradient(90deg,#204090,#3080e0);}
.sbar-spd{background:linear-gradient(90deg,#602090,#a040e0);}
.sbar-luk{background:linear-gradient(90deg,#208050,#40c070);}
.stat-val{font-size:11px;color:var(--text);font-weight:700;min-width:34px;text-align:right;}
.stat-btn-row{display:flex;gap:2px;}
.stat-adj{width:20px;height:20px;border-radius:4px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0;}
.stat-adj:hover{border-color:var(--gold);color:var(--gold);}
.boost-badge{font-size:8px;color:var(--gold2);background:rgba(232,184,76,.15);
  padding:1px 4px;border-radius:3px;font-weight:700;flex-shrink:0;}

/* ── QUEST ── */
.quest-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:10px 11px;margin-bottom:7px;display:flex;align-items:center;gap:9px;
  cursor:pointer;transition:all .15s;}
.quest-card:hover:not(.locked){border-color:var(--border3);background:var(--bg4);}
.quest-card.locked{opacity:.4;cursor:not-allowed;}
.quest-icon{font-size:22px;flex-shrink:0;}
.quest-info{flex:1;min-width:0;}
.quest-name{font-family:'Cinzel',serif;font-size:11px;color:var(--blue3);margin-bottom:2px;}
.quest-desc{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.quest-meta{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;}
.quest-cost{font-size:9px;color:var(--stamina);font-weight:700;}
.quest-rec{font-size:9px;color:var(--text3);}
.quest-rew{font-size:9px;color:var(--green2);}
.quest-badge{padding:2px 6px;border-radius:4px;font-size:8px;font-weight:700;letter-spacing:.5px;flex-shrink:0;}
.b-clear{background:rgba(58,170,96,.15);color:var(--green2);border:1px solid rgba(58,170,96,.3);}
.b-new  {background:rgba(209,79,79,.15); color:var(--red2);  border:1px solid rgba(209,79,79,.3);}
.b-lock {background:rgba(80,80,80,.15);  color:#556;         border:1px solid #334;}

/* ── BATTLE ── */
#battle-wrap{background:var(--panel2);border:1px solid var(--border);border-radius:10px;
  padding:14px;display:flex;flex-direction:column;gap:10px;}
.battle-stage{display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(135deg,#0a1520,#0f1e30);
  border-radius:8px;padding:12px;border:1px solid var(--border);min-height:110px;}
.combatant{display:flex;flex-direction:column;align-items:center;gap:5px;width:44%;}
.combatant-icon{font-size:40px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));}
.combatant-name{font-size:10px;color:var(--text2);font-weight:700;}
.chp-track{width:100%;height:7px;background:rgba(0,0,0,.5);border-radius:4px;overflow:hidden;}
.chp-fill{height:100%;border-radius:4px;transition:width .4s;}
.chp-p{background:linear-gradient(90deg,#882020,#e04040);}
.chp-e{background:linear-gradient(90deg,#804010,#c06020);}
.chp-num{font-size:8px;color:var(--text3);text-align:center;margin-top:1px;}
.vs-label{font-family:'Cinzel',serif;font-size:16px;color:var(--border2);}
.battle-log{background:#080e18;border:1px solid var(--border);border-radius:7px;
  padding:8px;height:120px;overflow-y:auto;font-size:10px;display:flex;flex-direction:column;gap:2px;}
.battle-log::-webkit-scrollbar{width:2px;}
.battle-log::-webkit-scrollbar-thumb{background:var(--border2);}
.log-line{line-height:1.6;padding:0;}
.la{color:#e07070;}.ld{color:#70a0e0;}.lh{color:#70d090;}.ls{color:var(--gold);}
.ll{color:var(--purple2);}.lsp{color:var(--cyan2);}
.battle-actions{display:flex;gap:7px;}

/* ── EQUIP ── */
.equip-slots{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:8px;}
.equip-slot{background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  padding:7px;transition:all .15s;min-height:52px;}
.equip-slot.has-item{cursor:pointer;}
.equip-slot.has-item:hover{border-color:var(--red2);}
.slot-label{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;font-weight:700;}
.slot-item{font-size:10px;color:var(--gold2);line-height:1.3;}
.slot-empty{font-size:10px;color:var(--text3);font-style:italic;}
.slot-stats{font-size:8px;color:var(--text2);margin-top:2px;}
.item-list{display:flex;flex-direction:column;gap:5px;}
.item-row{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:8px;display:flex;align-items:center;gap:8px;}
.item-icon{font-size:20px;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:11px;color:var(--text);font-weight:700;margin-bottom:1px;}
.item-stats-text{font-size:9px;color:var(--text2);}
.item-rarity{font-size:8px;font-weight:700;letter-spacing:.5px;margin-top:1px;}
.r-common{color:#778;}.r-uncommon{color:var(--green2);}.r-rare{color:var(--blue2);}
.r-epic{color:var(--purple2);}.r-legendary{color:var(--gold2);text-shadow:0 0 5px rgba(232,184,76,.4);}
.item-actions{display:flex;gap:3px;flex-shrink:0;}
.special-badge{display:inline-block;font-size:8px;color:var(--cyan2);
  background:rgba(34,192,216,.12);padding:1px 4px;border-radius:3px;font-weight:700;margin-top:2px;}
.equipped-badge{display:inline-block;font-size:8px;color:var(--gold);
  background:rgba(232,184,76,.1);padding:1px 4px;border-radius:3px;font-weight:700;border:1px solid rgba(232,184,76,.2);}

/* ── SHOP ── */
.shop-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:9px;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.shop-price{font-size:11px;color:var(--gold2);font-weight:700;white-space:nowrap;}

/* ── TOAST ── */
.toast{position:fixed;top:55px;left:50%;transform:translateX(-50%);
  background:var(--panel2);border:1px solid var(--border3);border-radius:8px;
  padding:7px 16px;font-size:11px;color:var(--text);z-index:500;
  animation:tIn .2s,tOut .2s 1.8s forwards;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.6);}
@keyframes tIn{from{opacity:0;transform:translate(-50%,-8px);}to{opacity:1;transform:translate(-50%,0);}}
@keyframes tOut{to{opacity:0;transform:translate(-50%,-8px);}}

/* ── MISC ── */
.exp-row{margin-bottom:8px;}
.exp-label{font-size:9px;color:var(--text3);margin-bottom:2px;display:flex;justify-content:space-between;}
.exp-track{height:5px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden;}
.exp-fill{height:100%;background:linear-gradient(90deg,#4020a0,#7040d8);border-radius:3px;transition:width .5s;}
.empty-state{text-align:center;padding:24px;color:var(--text3);font-size:11px;}
.evolve-ready{animation:eglow 1.5s infinite alternate;}
@keyframes eglow{from{box-shadow:0 0 5px rgba(232,184,76,.2);}to{box-shadow:0 0 15px rgba(232,184,76,.5);}}
.info-box{background:rgba(58,143,212,.08);border:1px solid rgba(58,143,212,.2);
  border-radius:7px;padding:8px 10px;font-size:10px;color:var(--text2);line-height:1.6;margin-bottom:8px;}
.warn-box{background:rgba(240,112,112,.08);border:1px solid rgba(240,112,112,.2);
  border-radius:7px;padding:6px 10px;font-size:10px;color:var(--red2);margin-bottom:6px;}
.save-row{display:flex;gap:6px;align-items:center;}
.save-slot{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  padding:8px;text-align:center;cursor:pointer;transition:all .15s;}
.save-slot:hover{border-color:var(--border3);}
.save-slot-name{font-size:11px;color:var(--text);font-weight:700;}
.save-slot-info{font-size:9px;color:var(--text3);margin-top:2px;}
input[type=text]{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;
  padding:9px 11px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;
  outline:none;width:100%;transition:border-color .15s;}
input[type=text]:focus{border-color:var(--blue2);}
</style>
</head>
<body>
<div id="app">
  <div id="topbar" style="display:none">
    <div id="char-mini">
      <div id="char-icon">⚔️</div>
      <div style="display:flex;flex-direction:column;gap:1px;">
        <div id="char-name">—</div>
        <div id="char-class">—</div>
      </div>
    </div>
    <div id="top-stats">
      <div class="top-stat">
        <div class="top-stat-bar"><div id="tsf-hp" class="top-stat-fill tsf-hp" style="width:100%"></div></div>
        <div class="top-stat-label">HP</div>
      </div>
      <div class="top-stat">
        <div class="top-stat-bar"><div id="tsf-st" class="top-stat-fill tsf-st" style="width:100%"></div></div>
        <div class="top-stat-label">ST</div>
      </div>
      <div class="coins-display">💰<span id="top-coins">0</span></div>
    </div>
  </div>
  <div id="content"></div>
  <nav id="nav" style="display:none">
    <button class="nav-btn active" data-s="status" onclick="showScreen('status')"><span class="nav-icon">📊</span><span>ステータス</span></button>
    <button class="nav-btn" data-s="quest"  onclick="showScreen('quest')"> <span class="nav-icon">⚔️</span><span>クエスト</span></button>
    <button class="nav-btn" data-s="equip"  onclick="showScreen('equip')"> <span class="nav-icon">🛡️</span><span>装備</span></button>
    <button class="nav-btn" data-s="shop"   onclick="showScreen('shop')">  <span class="nav-icon">🏪</span><span>ショップ</span></button>
    <button class="nav-btn" data-s="class"  onclick="showScreen('class')"> <span class="nav-icon">✨</span><span>職業</span></button>
  </nav>
</div>
<script>
// ═══════════════════════════════════════════════════
//  CLASS TREE
// ═══════════════════════════════════════════════════
const CT={
  swordsman:{name:'剣士',  icon:'⚔️',tier:0,desc:'バランス型の戦士',tags:['str'],

  mage:     {name:'魔法使い',icon:'🧙',tier:0,desc:'魔法で大ダメージ',tags:['mag'],
    growth:{hp:3,atk:7,def:2,spd:4,luk:3},base:{hp:50,atk:18,def:4,spd:8,luk:5},
    boost:['atk','spd'],evolve1:['sage','sorcerer'],skill:'魔法弾'},
  cleric:   {name:'僧侶',  icon:'🙏',tier:0,desc:'回復と支援に特化',tags:['heal'],
    growth:{hp:5,atk:2,def:4,spd:2,luk:5},base:{hp:65,atk:7,def:9,spd:5,luk:8},

  thief:    {name:'盗賊',  icon:'🗡️',tier:0,desc:'素早く急所を狙う',tags:['agi','luck'],
    growth:{hp:4,atk:5,def:2,spd:6,luk:5},base:{hp:55,atk:14,def:5,spd:12,luk:8},
    boost:['atk','spd'],evolve1:['ninja','pirate'],skill:'急所突き'},
  archer:   {name:'弓使い',icon:'🏹',tier:0,desc:'遠距離から安全に',tags:['agi'],
    growth:{hp:4,atk:5,def:2,spd:5,luk:4},base:{hp:58,atk:13,def:6,spd:10,luk:6},
    boost:['spd','luk'],evolve1:['hunter','magicArcher'],skill:'連射'},
  // Tier1
  knight:     {name:'騎士',    icon:'🛡️',tier:1,desc:'鉄壁の防御',tags:['str'],
    growth:{hp:9,atk:4,def:7,spd:1,luk:2},base:null,parent:'swordsman',boost:['def','hp'],evolve1:['grandKnight'],skill:'シールドバッシュ'},
  hero:       {name:'勇者',    icon:'🌟',tier:1,desc:'全能力が高い',tags:['str','luck'],
    growth:{hp:7,atk:6,def:5,spd:4,luk:5},base:null,parent:'swordsman',boost:['atk','luk'],evolve1:['legendHero'],skill:'勇者の一撃'},

let P=null, curScreen='title';

function newPlayer(name,classId){
  const cls=CT[classId], base=cls.base;
  return{name,classId,level:1,exp:0,expNext:80,
    hp:base.hp,maxHp:base.hp,
    stamina:10,maxStamina:10,coins:100,
    stats:{hp:base.hp,atk:base.atk,def:base.def,spd:base.spd,luk:base.luk},
    freePoints:0,
    equipped:{weapon:null,armor:null,acc:null},
    inventory:[],cleared:[],
    staminaTimer:Date.now()};
}

// 実効ステータス（装備込み）
function getStats(){
  const s={...P.stats};
  for(const sl of['weapon','armor','acc']){
    const it=ITEMS[P.equipped[sl]];
    if(!it)continue;
    for(const k of['atk','def','spd','luk'])if(it[k])s[k]=(s[k]||0)+it[k];
  }
  return s;
}
function getCls(){return CT[P.classId];}

// ステポイント振り（boost対象は+2）
function allocStat(key,delta){
  if(delta>0&&P.freePoints<=0)return;
  const cls=getCls();
  const boosted=cls.boost&&cls.boost.includes(key);
  const gain=boosted?2*delta:delta;
  const minV=CT[P.classId].base?.[key]??1;
  if(delta<0&&P.stats[key]<=minV)return;
  P.stats[key]+=gain;
  if(key==='hp'){P.maxHp+=gain*3;P.hp=Math.min(P.hp,P.maxHp);}
  P.freePoints-=delta;
  updateTopbar();renderStatus();
}

// スタミナ自動回復
setInterval(()=>{
  if(!P||P.stamina>=P.maxStamina)return;
  if((Date.now()-P.staminaTimer)/1000>=120){
    P.stamina=Math.min(P.maxStamina,P.stamina+1);
    P.staminaTimer=Date.now();
    updateTopbar();
    if(curScreen==='quest')renderQuest();
  }
},5000);

// ═══════════════════════════════════════════════════
//  SAVE / LOAD  (localStorage, 3スロット)
// ═══════════════════════════════════════════════════
const SAVE_KEY='cof_save_';
function saveGame(slot){
  if(!P)return;
  localStorage.setItem(SAVE_KEY+slot,JSON.stringify({P,ts:Date.now()}));
  toast(`スロット${slot}にセーブしました`);
}
function loadGame(slot){
  const raw=localStorage.getItem(SAVE_KEY+slot);
  if(!raw){toast('セーブデータがありません');return;}
  const data=JSON.parse(raw);
  P=data.P;
  document.getElementById('topbar').style.display='flex';
  document.getElementById('nav').style.display='grid';
  updateTopbar();showScreen('status');
  toast(`スロット${slot}からロードしました`);
}
function getSaveInfo(slot){
  const raw=localStorage.getItem(SAVE_KEY+slot);
  if(!raw)return null;
  const data=JSON.parse(raw);
  const d=new Date(data.ts);
  return{name:data.P.name,cls:CT[data.P.classId].name,lv:data.P.level,
    date:`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`};
}
function deleteGame(slot){
  if(!confirm(`スロット${slot}のデータを削除しますか？`))return;
  localStorage.removeItem(SAVE_KEY+slot);
  renderTitle();
}

// ═══════════════════════════════════════════════════
//  BEST EQUIP AUTO
// ═══════════════════════════════════════════════════
// スロットごとに「ATK+DEF+SPD+LUK」合計が最大のものを装備
function autoEquip(){
  let count=0;
  for(const slot of['weapon','armor','acc']){
    const candidates=P.inventory.filter((id,i)=>
      P.inventory.indexOf(id)===i && ITEMS[id]?.slot===slot
    );
    if(!candidates.length)continue;
    const score=id=>{
      const it=ITEMS[id];
      return(it.atk||0)+(it.def||0)+(it.spd||0)+(it.luk||0);
    };
    const best=candidates.sort((a,b)=>score(b)-score(a))[0];
    if(P.equipped[slot]!==best){P.equipped[slot]=best;count++;}
  }
  updateTopbar();
  renderEquip();
  toast(count>0?`${count}箇所を最強装備に変更！`:'すでに最強装備です');
}

// ═══════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════
function showScreen(id){
  curScreen=id;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.s===id));
  ({status:renderStatus,quest:renderQuest,equip:renderEquip,shop:renderShop,class:renderClass})[id]?.();
}
function updateTopbar(){
  if(!P)return;
  const cls=getCls();
  document.getElementById('char-icon').textContent=cls.icon;
  document.getElementById('char-name').textContent=P.name;
  document.getElementById('char-class').textContent=`Lv.${P.level} ${cls.name}`;
  document.getElementById('tsf-hp').style.width=(P.hp/P.maxHp*100)+'%';
  document.getElementById('tsf-st').style.width=(P.stamina/P.maxStamina*100)+'%';
  document.getElementById('top-coins').textContent=P.coins.toLocaleString();
}

async function runBattle(questId,skip){
  const q=QUESTS.find(x=>x.id===questId);
  const es=getStats();
  document.getElementById('bact').innerHTML=`<span style="color:var(--text3);font-size:10px;">戦闘中…</span>`;

  let pHp=P.hp, eHp=q.enemy.hp;
  const log=[];
  const logAdd=(msg,cls='')=>{
    log.push({msg,cls});
    if(!skip){
      const el=document.getElementById('blog');
      if(el){el.innerHTML+=`<div class="log-line ${cls}">${msg}</div>`;el.scrollTop=el.scrollHeight;}
    }
  };
  const updBars=()=>{
    const ph=document.getElementById('php'),eh=document.getElementById('ehp');
    const pn=document.getElementById('phn'),en=document.getElementById('ehn');
    if(ph)ph.style.width=Math.max(0,pHp/P.maxHp*100)+'%';
    if(eh)eh.style.width=Math.max(0,eHp/q.enemy.hp*100)+'%';
    if(pn)pn.textContent=`${Math.max(0,Math.round(pHp))}/${P.maxHp}`;
    if(en)en.textContent=`${Math.max(0,Math.round(eHp))}/${q.enemy.hp}`;
  };
  const delay=ms=>new Promise(r=>setTimeout(r,ms));

  // 装備特殊フラグ
  const wpn=P.equipped.weapon, arm=P.equipped.armor, acc=P.equipped.acc;
  const hasRegen  = arm==='angelicArmor'||arm==='godArmor';
  const hasSoul   = wpn==='soulEdge';
  const hasFlame  = wpn==='flameSword';
  const hasVoid   = wpn==='voidSword';
  const hasDragon = wpn==='dragonSword';
  const hasArcane = wpn==='arcaneStaff';
  const hasDrArmor= arm==='dragonArmor';
  const hasGodArm = arm==='godArmor';
  const hasIgnis  = acc==='ignisShard';
  const hasDemon  = acc==='demonCore';
  const hasChaos  = acc==='chaosCore';
  const hasFang   = acc==='dragonFang';
  const hasDeep   = acc==='deepSeaRing';
  const hasBoots  = acc==='rogueBoots';

  // ATK倍率
  let atkMult=1;
  if(hasIgnis) atkMult*=1.1;
  if(hasDemon) atkMult*=1.15;
  if(hasChaos) atkMult*=1.1;
  if(hasFlame||hasVoid||hasArcane) atkMult*=1.12;

  // 素早さによる連続攻撃回数（SPD/20 + 1、最大4回）
  // LUKによるドロップ補正
  const isHealer=['cleric','archpriest','paladin','godPriest','holyKnight'].includes(P.classId);

  let round=0;
  while(pHp>0&&eHp>0){
    round++;
    if(round>120){logAdd('長期戦！引き分け…','ls');break;}

    // ── 連続攻撃回数（SPD依存）
    const hits=Math.min(4,1+Math.floor(es.spd/20));

    for(let h=0;h<hits;h++){
      if(eHp<=0)break;
      let pAtk=Math.max(1,Math.round(es.atk*atkMult)-Math.floor(q.enemy.def*0.45)+Math.floor(Math.random()*5-2));
      // 会心率：LUK*0.5+3 +装備ボーナス
      const critRate=es.luk*0.5+3+(hasFang?15:0)+(hasDeep?10:0);
      const crit=Math.random()*100<critRate;
      if(crit) pAtk=Math.floor(pAtk*1.9);
      // 魂喰らいDoT
      if(hasSoul){const dot=Math.floor(eHp*0.03);eHp-=dot;}
      eHp-=pAtk;
      if(hits>1){
        if(crit) logAdd(`　🌟 ${h+1}撃目クリティカル！ ${pAtk}ダメ`,'la');
        else logAdd(`　${h+1}撃目: ${pAtk}ダメ`,'la');
      } else {
        if(crit) logAdd(`🌟 クリティカル！ ${q.enemy.name}に ${pAtk}ダメ！`,'la');
        else logAdd(`あなたの攻撃！ ${q.enemy.name}に ${pAtk}ダメ`,'la');
      }
    }
    if(hits>1) logAdd(`⚡ ${hits}連続攻撃！ 合計ダメ確定`,'lsp');

    if(!skip){updBars();await delay(280);}
    if(eHp<=0)break;

    // 自動回復
    if(hasRegen){const rg=Math.floor(P.maxHp*0.03);pHp=Math.min(P.maxHp,pHp+rg);logAdd(`👼 自動回復 +${rg}HP`,'lh');}

    // 敵攻撃
    let eAtk=Math.max(1,q.enemy.atk-Math.floor(es.def*0.45)+Math.floor(Math.random()*5-2));
    if(hasDrArmor||hasGodArm) eAtk=Math.floor(eAtk*(hasGodArm?0.85:0.90));
    const dodgeRate=es.spd*0.3+(hasBoots?20:0);
    if(Math.random()*100<dodgeRate){
      logAdd(`💨 回避！ ${q.enemy.name}の攻撃をかわした`,'ld');
    } else {
      pHp-=eAtk;
      logAdd(`${q.enemy.name}の攻撃！ あなたに ${eAtk}ダメ`,'');
    }

    // 回復職スキル
    if(isHealer&&round%3===0){
      const heal=Math.floor(es.luk*2+15);
      pHp=Math.min(P.maxHp,pHp+heal);
      logAdd(`💚 ${getCls().skill}で ${heal}HP回復！`,'lh');
    }

    if(!skip){updBars();await delay(280);}
  }

  if(skip)updBars();
  const won=eHp<=0;
  P.hp=P.maxHp; // 勝敗問わずHP全回復

  if(won){
    const expGain=q.exp;
    const goldGain=q.gold+Math.floor(Math.random()*q.gold*0.25);
    P.exp+=expGain; P.coins+=goldGain;

    // ドロップ判定（LUKが高いほど確率UP）
    const lukBonus=Math.min(0.3,(es.luk-4)*0.003); // LUK1につき+0.3%、最大+30%
    const drops=[];
    q.drops.forEach(id=>{
      const it=ITEMS[id]; if(!it)return;
      // 基本確率（rankが高いほど低い）
      const base={legendary:0.02,epic:0.06,rare:0.12,uncommon:0.22,common:0.22}[it.rarity]||0.15;
      const rate=Math.min(base+lukBonus, base*2); // 最大でも基本の2倍まで
      if(Math.random()<rate){P.inventory.push(id);drops.push(it.name);}
    });

    logAdd('','');
    logAdd('✅ 勝利！','ls');
    logAdd(`EXP +${expGain}  💰 +${goldGain}`,'ls');
    if(drops.length) logAdd(`💎 ドロップ: ${drops.join('、')}`,'ll');
    else logAdd(`（今回はドロップなし）`,'');
    if(!P.cleared.includes(q.id)) P.cleared.push(q.id);

    // レベルアップ
    while(P.exp>=P.expNext){
      P.exp-=P.expNext;
      P.level++;
      P.expNext=Math.floor(P.expNext*1.28+P.level*10);
      const g=CT[P.classId].growth;
      P.stats.hp+=g.hp; P.maxHp+=g.hp*3;
      P.stats.atk+=g.atk; P.stats.def+=g.def;
      P.stats.spd+=g.spd; P.stats.luk+=g.luk;
      P.hp=P.maxHp;
      P.maxStamina+=1;
      P.stamina=P.maxStamina;
      P.freePoints+=3;
      logAdd(`🎉 Lv.${P.level}に上がった！ +3P ⚡スタミナ全回復(上限${P.maxStamina})`,'ls');
      if(P.level===20||P.level===40) logAdd('⭐ 職業進化が解放！ 職業タブを確認！','ls');
    }
  } else {
    logAdd('','');
    logAdd('💀 敗北… HPが尽きた','ls');
    const ce=Math.floor(q.exp*0.15);
    P.exp+=ce; logAdd(`EXP +${ce}（敗北ボーナス）`,'ls');
  }

  updateTopbar();
  const ae=document.getElementById('bact');
  if(ae) ae.innerHTML=`<button class="btn btn-${won?'gold':'red'} btn-full" onclick="showScreen('quest')">
    ${won?'✅ クエスト完了':'💀 リタイア'} → クエスト一覧
  </button>`;

  if(skip){
    const le=document.getElementById('blog');
    if(le){le.innerHTML=log.map(l=>`<div class="log-line ${l.cls}">${l.msg||'　'}</div>`).join('');le.scrollTop=le.scrollHeight;}
  }
}

                ${it.special?`<div class="special-badge">${it.special}</div>`:''}
                <div class="item-rarity r-${it.rarity}">${RARITY_LABEL[it.rarity]}</div>
              </div>
              <div class="item-actions">
                ${isEq
                  ?`<button class="btn btn-ghost btn-xs" onclick="unequipItem('${it.slot}')">外す</button>`
                  :`<button class="btn btn-blue btn-xs" onclick="equipItem('${id}')">装備</button>`}
                ${isEq
                  ?`<button class="btn btn-ghost btn-xs" style="opacity:.3;cursor:not-allowed;" title="装備中は売却不可">売</button>`
                  :`<button class="btn btn-ghost btn-xs" onclick="sellItem('${id}')">売</button>`}
              </div>
            </div>`;
          }).join('')}
        </div>`}
    </div>`;
}

function equipItem(id){
  const it=ITEMS[id];if(!it)return;
  P.equipped[it.slot]=id;updateTopbar();renderEquip();toast(`${it.name} を装備！`);
}
function unequipItem(slot){P.equipped[slot]=null;updateTopbar();renderEquip();}
function sellItem(id){
  // 装備中は売却不可
  if(Object.values(P.equipped).includes(id)){toast('装備中は売却できません！');return;}
  const idx=P.inventory.indexOf(id);if(idx<0)return;
  P.inventory.splice(idx,1);
  const price=Math.max(10,Math.floor((ITEMS[id].price||80)*0.4));
  P.coins+=price;updateTopbar();renderEquip();
  toast(`${ITEMS[id].name}を売却 (+${price}G)`);
}

// ═══════════════════════════════════════════════════
//  SHOP
// ═══════════════════════════════════════════════════
function renderShop(){
  const shopItems=Object.entries(ITEMS).filter(([,v])=>v.shop).map(([k])=>k);
  document.getElementById('content').innerHTML=`
    <div class="panel">
      <div class="panel-title">💰 所持金</div>
      <div style="font-size:20px;font-weight:700;color:var(--gold2);">💰 ${P.coins.toLocaleString()} G</div>
      <div style="font-size:9px;color:var(--text3);margin-top:5px;">ショップ品は安定して購入できますが、ドロップ品の方が強力です。</div>
    </div>
    <div class="panel">
      <div class="panel-title">🏪 商品一覧</div>
      ${shopItems.map(id=>{
        const it=ITEMS[id];
        const ok=P.coins>=it.price;
        return`<div class="shop-item" style="opacity:${ok?1:.45}">
          <div class="item-icon">${it.icon}</div>
          <div class="item-info" style="flex:1;">
            <div class="item-name">${it.name}</div>
            <div class="item-stats-text">${statLine(it)}</div>
            <div class="item-rarity r-${it.rarity}">${RARITY_LABEL[it.rarity]}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
            <div class="shop-price">💰${it.price.toLocaleString()}</div>
            <button class="btn btn-gold btn-xs" onclick="buyItem('${id}')" ${ok?'':'disabled'}>購入</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}
function buyItem(id){
  const it=ITEMS[id];
  if(P.coins<it.price){toast('お金が足りません！');return;}
  P.coins-=it.price;P.inventory.push(id);
  updateTopbar();renderShop();toast(`${it.name} を購入！`);
}

// ═══════════════════════════════════════════════════
//  CLASS / EVOLVE
// ═══════════════════════════════════════════════════
function renderClass(){
  const cls=getCls();
  const canEv1=P.level>=20&&cls.tier===0;
  const canEv2=P.level>=40&&cls.tier===1;
  const canEv=canEv1||canEv2;

  document.getElementById('content').innerHTML=`
    <div class="panel ${canEv?'evolve-ready':''}">
      <div class="panel-title">✨ 現在の職業</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
        <div style="font-size:44px;">${cls.icon}</div>
        <div>
          <div style="font-family:'Cinzel',serif;font-size:16px;color:var(--gold2);">${cls.name}</div>
          <div style="font-size:10px;color:var(--text2);margin-top:2px;">${cls.desc}</div>
          <div style="font-size:10px;color:var(--purple2);margin-top:2px;">スキル: ${cls.skill}</div>
          <div style="font-size:10px;color:var(--gold2);margin-top:2px;">✦ 得意: ${cls.boost.map(b=>BN[b]).join('・')}</div>
        </div>
      </div>
      <div style="font-size:9px;color:var(--text3);">成長率 HP+${cls.growth.hp} ATK+${cls.growth.atk} DEF+${cls.growth.def} SPD+${cls.growth.spd} LUK+${cls.growth.luk}</div>
    </div>

    ${canEv?`
    <div class="panel">
      <div class="panel-title" style="color:var(--gold2);">⭐ 職業進化が可能！</div>
      <div style="font-size:10px;color:var(--text2);margin-bottom:8px;">進化先を選んでください。この選択は取り消せません。</div>
      <div class="class-grid">
        ${cls.evolve1.map(eid=>{
          const ec=CT[eid];
          return`<div class="class-card" onclick="evolveClass('${eid}')">
            <div class="class-icon">${ec.icon}</div>
            <div class="class-name">${ec.name}</div>
            <div class="class-desc">${ec.desc}</div>
            <div class="class-tags">${ec.tags.map(t=>`<span class="tag tag-${t}">${TL[t]}</span>`).join('')}</div>
            <div style="margin-top:4px;font-size:8px;color:var(--gold2);">✦ 得意: ${ec.boost.map(b=>BN[b]).join('・')}</div>
            <div style="font-size:8px;color:var(--purple2);">スキル: ${ec.skill}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`:`
    <div class="panel">
      <div class="panel-title">🗺️ 次の進化</div>
      ${cls.tier===0?`→ <span style="color:var(--gold2);">${cls.evolve1.map(id=>CT[id].name).join(' / ')}</span> <span style="color:var(--text3);">（Lv.20）</span>`
      :cls.tier===1?`→ <span style="color:var(--gold2);">${cls.evolve1.map(id=>CT[id]?.name||'???').join(' / ')}</span> <span style="color:var(--text3);">（Lv.40）</span>`
      :`<span style="color:var(--green2);">🌟 最終形態に到達！</span>`}
    </div>`}

    <div class="panel">
      <div class="panel-title">📜 全職業ツリー</div>
      ${BASE_CLASSES.map(bid=>{
        const bc=CT[bid];
        return`<div style="margin-bottom:8px;">
          <span style="font-size:14px;">${bc.icon}</span>
          <span style="font-family:'Cinzel',serif;font-size:11px;color:${P.classId===bid?'var(--gold2)':'var(--text2)'};">${bc.name}</span>
          <div style="padding-left:18px;font-size:9px;color:var(--text3);margin-top:1px;">
            ${bc.evolve1.map(e1=>{const c1=CT[e1];
              return`→<span style="color:${P.classId===e1?'var(--gold2)':'var(--text3)'};">${c1.icon}${c1.name}</span>
              ${c1.evolve1.map(e2=>{const c2=CT[e2];
                return` →<span style="color:${P.classId===e2?'var(--gold2)':'var(--text3)'};">${c2.icon}${c2.name}</span>`;
              }).join('')}　`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function evolveClass(newId){
  if(!confirm(`${CT[newId].name}に進化しますか？`))return;
  P.classId=newId;
  const ng=CT[newId].growth;
  P.stats.hp+=ng.hp*3; P.maxHp+=ng.hp*9; P.hp=P.maxHp;
  P.stats.atk+=ng.atk*2; P.stats.def+=ng.def*2;
  P.stats.spd+=ng.spd*2; P.stats.luk+=ng.luk*2;
  P.freePoints+=5;
  updateTopbar();renderClass();toast(`✨ ${CT[newId].name} に進化！`);
}

// ═══════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════
function statLine(it){
  const p=[];
  if(it.atk)p.push(`ATK+${it.atk}`);
  if(it.def)p.push(`DEF+${it.def}`);
  if(it.spd)p.push(`SPD${it.spd>=0?'+':''}${it.spd}`);
  if(it.luk)p.push(`LUK+${it.luk}`);
  return p.join(' ')||'—';
}
function toast(msg){
  const el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2100);
}

renderTitle();
</script>
</body>
</html>
