<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Chronicles of Fate</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
:root{
  --bg:#0f1923;--bg2:#162030;--bg3:#1c2a3a;--bg4:#223040;
  --panel:#1a2535;--panel2:#1e2d40;
  --border:#2a3f55;--border2:#3a5570;--border3:#4a6a88;
  --gold:#e8b84c;--gold2:#f5d068;--gold3:#fff8e0;
  --red:#d94f4f;--red2:#f07070;
  --blue:#3a8fd4;--blue2:#5aafee;--blue3:#90d0ff;
  --green:#3aaa60;--green2:#55cc80;--green3:#88eeb0;
  --purple:#8844cc;--purple2:#aa66ee;--purple3:#cc99ff;
  --cyan:#22c0d8;--cyan2:#44ddf0;
  --orange:#e07030;--orange2:#f09050;
  --text:#cce0f0;--text2:#8ab0cc;--text3:#4a7090;
  --stamina:#f0b030;
  --boss:#cc3366;--boss2:#ee5588;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;
  min-height:100vh;display:flex;justify-content:center;overflow-x:hidden;}
#app{width:390px;max-width:100vw;height:100vh;height:100dvh;display:flex;flex-direction:column;
  background:linear-gradient(160deg,#0f1923 0%,#12202e 60%,#0f1d2a 100%);
  box-shadow:0 0 40px rgba(0,0,0,.6);}

/* ── TOPBAR ── */
#topbar{display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px 5px;
  background:linear-gradient(180deg,#0a1520,#0f1d2c);
  border-bottom:1px solid var(--border2);
  flex-shrink:0;}
#char-mini{display:flex;align-items:center;gap:7px;}
#char-icon{width:32px;height:32px;border-radius:7px;background:var(--bg3);
  border:1px solid var(--border3);display:flex;align-items:center;justify-content:center;font-size:17px;}
#char-name{font-family:'Cinzel',serif;font-size:11px;color:var(--gold2);font-weight:600;line-height:1.2;}
#char-class-lv{font-size:9px;color:var(--text2);}
#top-stats{display:flex;gap:7px;align-items:center;}
.ts{display:flex;flex-direction:column;align-items:center;gap:1px;}
.ts-bar{width:44px;height:4px;background:rgba(0,0,0,.5);border-radius:2px;overflow:hidden;}
.ts-fill{height:100%;border-radius:2px;transition:width .4s;}
.tsf-hp{background:linear-gradient(90deg,#c03030,#e85050);}
.tsf-st{background:linear-gradient(90deg,#c08020,#f0b030);}
.ts-lbl{font-size:7px;color:var(--text3);letter-spacing:.5px;}
.coins-disp{font-size:11px;font-weight:700;color:var(--gold2);}
#title-tag{font-size:9px;color:var(--purple2);font-style:italic;margin-top:1px;}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;padding:9px;min-height:0;}
#content::-webkit-scrollbar{width:3px;}
#content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── NAV ── */
#nav{display:grid;grid-template-columns:repeat(6,1fr);flex-shrink:0;
  background:#080f18;border-top:1px solid var(--border2);
  position:sticky;bottom:0;z-index:100;}
.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;padding:6px 2px;cursor:pointer;transition:all .15s;
  border:none;background:transparent;color:var(--text3);
  font-family:'Noto Sans JP',sans-serif;font-size:7px;}
.nb.active{color:var(--blue2);background:rgba(58,143,212,.08);}
.nb.boss-tab.active{color:var(--boss2);background:rgba(204,51,102,.08);}
.nb:hover:not(.active){color:var(--text2);}
.nb-icon{font-size:17px;}
.nb.active .nb-icon{filter:drop-shadow(0 0 4px currentColor);}

/* ── PANELS ── */
.panel{background:var(--panel2);border:1px solid var(--border);border-radius:9px;
  padding:11px;margin-bottom:7px;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--border2),transparent);}
.pt{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);
  letter-spacing:1px;margin-bottom:9px;display:flex;align-items:center;gap:7px;}
.pt::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;
  padding:6px 12px;border-radius:7px;border:none;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;font-size:11px;font-weight:700;
  transition:all .15s;letter-spacing:.2px;}
.btn-gold{background:linear-gradient(135deg,#9a6820,#c9953c,#e8c060);color:#0a0800;
  box-shadow:0 2px 8px rgba(200,150,50,.3);}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-blue{background:linear-gradient(135deg,#1a3f70,#2a6ab0,#3a8fd4);color:#fff;}
.btn-green{background:linear-gradient(135deg,#1a5030,#2a8048,#3aaa60);color:#fff;}
.btn-red{background:linear-gradient(135deg,#6a1818,#a83030,#d44848);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{border-color:var(--border3);color:var(--text);}
.btn-cyan{background:linear-gradient(135deg,#0a4858,#1880a0,#22c0d8);color:#fff;}
.btn-orange{background:linear-gradient(135deg,#6a3010,#b05020,#e07030);color:#fff;}
.btn-boss{background:linear-gradient(135deg,#6a1030,#a82050,#cc3366);color:#fff;
  box-shadow:0 2px 8px rgba(204,51,102,.3);}
.btn-sm{padding:4px 8px;font-size:10px;}
.btn-xs{padding:3px 6px;font-size:9px;}
.btn-full{width:100%;}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;filter:none!important;}

/* ── TITLE ── */
#screen-title{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:88vh;padding:20px;text-align:center;}
.game-logo{font-family:'Cinzel',serif;font-size:28px;color:var(--gold2);
  text-shadow:0 0 30px rgba(232,184,76,.4);font-weight:700;line-height:1.3;margin-bottom:3px;}
.game-sub{font-size:10px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:28px;}
.save-slot{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:9px;margin-bottom:6px;}
.save-slot-name{font-size:12px;color:var(--text);font-weight:700;}
.save-slot-info{font-size:9px;color:var(--text3);margin-top:1px;}

/* ── CLASS CARDS ── */
.class-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.cc{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:9px;cursor:pointer;transition:all .18s;text-align:center;}
.cc:hover,.cc.sel{border-color:var(--blue2);background:rgba(58,143,212,.06);}
.cc.sel{box-shadow:0 0 10px rgba(58,143,212,.25);}
.ci{font-size:24px;margin-bottom:2px;}
.cn{font-family:'Cinzel',serif;font-size:10px;color:var(--blue2);margin-bottom:2px;}
.cd{font-size:8px;color:var(--text3);line-height:1.4;}
.tags{display:flex;gap:2px;justify-content:center;margin-top:3px;flex-wrap:wrap;}
.tag{font-size:7px;padding:1px 3px;border-radius:3px;font-weight:700;}
.tag-str{background:rgba(209,79,79,.2);color:var(--red2);}
.tag-mag{background:rgba(90,175,238,.2);color:var(--blue2);}
.tag-heal{background:rgba(58,170,96,.2);color:var(--green2);}
.tag-agi{background:rgba(170,102,238,.2);color:var(--purple2);}
.tag-luck{background:rgba(232,184,76,.2);color:var(--gold2);}

/* ── STAT ROWS ── */
.sr{display:flex;align-items:center;gap:5px;margin-bottom:6px;}
.si{font-size:12px;width:17px;text-align:center;flex-shrink:0;}
.sn{font-size:9px;color:var(--text2);width:28px;flex-shrink:0;font-weight:700;}
.sbw{flex:1;height:6px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden;}
.sbf{height:100%;border-radius:3px;transition:width .4s;}
.sbf-hp {background:linear-gradient(90deg,#a02020,#e04040);}
.sbf-atk{background:linear-gradient(90deg,#a06020,#e09030);}
.sbf-def{background:linear-gradient(90deg,#204090,#3080e0);}
.sbf-spd{background:linear-gradient(90deg,#602090,#a040e0);}
.sbf-luk{background:linear-gradient(90deg,#208050,#40c070);}
.sv{font-size:11px;color:var(--text);font-weight:700;min-width:32px;text-align:right;}
.sbtn-row{display:flex;gap:2px;}
.sadj{width:19px;height:19px;border-radius:4px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0;}
.sadj:hover{border-color:var(--gold);color:var(--gold);}
.boost-badge{font-size:7px;color:var(--gold2);background:rgba(232,184,76,.15);
  padding:1px 3px;border-radius:3px;font-weight:700;flex-shrink:0;}

/* ── QUEST ── */
.qcard{background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  padding:9px 10px;margin-bottom:6px;display:flex;align-items:center;gap:8px;
  cursor:pointer;transition:all .15s;}
.qcard:hover:not(.locked){border-color:var(--border3);background:var(--bg4);}
.qcard.locked{opacity:.4;cursor:not-allowed;}
.qi{font-size:20px;flex-shrink:0;}
.qinfo{flex:1;min-width:0;}
.qname{font-family:'Cinzel',serif;font-size:10px;color:var(--blue3);margin-bottom:1px;}
.qdesc{font-size:8px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qmeta{display:flex;gap:4px;margin-top:2px;flex-wrap:wrap;}
.qcost{font-size:8px;color:var(--stamina);font-weight:700;}
.qrec{font-size:8px;color:var(--text3);}
.qrew{font-size:8px;color:var(--green2);}
.qbadge{padding:2px 5px;border-radius:3px;font-size:7px;font-weight:700;letter-spacing:.5px;flex-shrink:0;}
.b-clear{background:rgba(58,170,96,.15);color:var(--green2);border:1px solid rgba(58,170,96,.3);}
.b-new{background:rgba(209,79,79,.15);color:var(--red2);border:1px solid rgba(209,79,79,.3);}
.b-lock{background:rgba(80,80,80,.15);color:#556;border:1px solid #334;}

/* ── BOSS ── */
.boss-card{background:linear-gradient(135deg,#1a0820,#250d30);
  border:1px solid rgba(204,51,102,.4);border-radius:9px;
  padding:11px;margin-bottom:7px;position:relative;overflow:hidden;}
.boss-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--boss),transparent);}
.boss-name{font-family:'Cinzel',serif;font-size:13px;color:var(--boss2);margin-bottom:3px;}
.boss-desc{font-size:9px;color:var(--text2);margin-bottom:6px;}
.boss-stats{display:flex;gap:8px;font-size:9px;color:var(--text3);margin-bottom:6px;flex-wrap:wrap;}
.boss-reward{font-size:9px;color:var(--purple2);margin-bottom:7px;}
.boss-clear-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:8px;font-weight:700;
  background:rgba(58,170,96,.15);color:var(--green2);border:1px solid rgba(58,170,96,.3);}

/* ── BATTLE ── */
#bwrap{background:var(--panel2);border:1px solid var(--border);border-radius:9px;
  padding:12px;display:flex;flex-direction:column;gap:9px;}
.bstage{display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(135deg,#0a1520,#0f1e30);
  border-radius:7px;padding:10px;border:1px solid var(--border);min-height:100px;}
.combatant{display:flex;flex-direction:column;align-items:center;gap:4px;width:44%;}
.cicon{font-size:38px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));}
.cname{font-size:9px;color:var(--text2);font-weight:700;text-align:center;}
.chp-t{width:100%;height:6px;background:rgba(0,0,0,.5);border-radius:3px;overflow:hidden;}
.chp-f{height:100%;border-radius:3px;transition:width .4s;}
.chp-p{background:linear-gradient(90deg,#882020,#e04040);}
.chp-e{background:linear-gradient(90deg,#804010,#c06020);}
.chp-boss{background:linear-gradient(90deg,#881040,#cc2060);}
.chp-n{font-size:8px;color:var(--text3);text-align:center;margin-top:1px;}
.vs-lbl{font-family:'Cinzel',serif;font-size:15px;color:var(--border2);}
.blog{background:#080e18;border:1px solid var(--border);border-radius:6px;
  padding:7px;height:110px;overflow-y:auto;font-size:10px;display:flex;flex-direction:column;gap:1px;}
.blog::-webkit-scrollbar{width:2px;}
.blog::-webkit-scrollbar-thumb{background:var(--border2);}
.ll{line-height:1.6;}
.la{color:#e07070;}.ld{color:#70a0e0;}.lh{color:#70d090;}.ls{color:var(--gold);}
.llt{color:var(--purple2);}.lsp{color:var(--cyan2);}.lboss{color:var(--boss2);}
.bact{display:flex;gap:6px;}

/* ── EQUIP ── */
.eslots{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:7px;}
.eslot{background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  padding:6px;min-height:48px;position:relative;}
.eslot.has-item{cursor:pointer;}
.eslot.has-item:hover{border-color:var(--red2);}
.esl-lbl{font-size:7px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px;font-weight:700;}
.esl-name{font-size:9px;color:var(--gold2);line-height:1.3;}
.esl-empty{font-size:9px;color:var(--text3);font-style:italic;}
.esl-stats{font-size:7px;color:var(--text2);margin-top:1px;}
.ilist{display:flex;flex-direction:column;gap:4px;}
.irow{background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  padding:7px;display:flex;align-items:center;gap:7px;}
.iicon{font-size:18px;flex-shrink:0;}
.iinfo{flex:1;min-width:0;}
.iname{font-size:10px;color:var(--text);font-weight:700;margin-bottom:1px;}
.istats{font-size:8px;color:var(--text2);}
.irarity{font-size:7px;font-weight:700;letter-spacing:.5px;margin-top:1px;}
.r-common{color:#778;}.r-uncommon{color:var(--green2);}.r-rare{color:var(--blue2);}
.r-epic{color:var(--purple2);}.r-legendary{color:var(--gold2);}
.r-bossonly{color:var(--boss2);text-shadow:0 0 5px rgba(204,51,102,.4);}
.sp-badge{display:inline-block;font-size:7px;color:var(--cyan2);
  background:rgba(34,192,216,.12);padding:1px 3px;border-radius:2px;font-weight:700;margin-top:1px;}
.eq-badge{display:inline-block;font-size:7px;color:var(--gold);
  background:rgba(232,184,76,.1);padding:1px 3px;border-radius:2px;font-weight:700;border:1px solid rgba(232,184,76,.2);}
.fav-badge{font-size:10px;cursor:pointer;flex-shrink:0;}
.iact{display:flex;gap:2px;flex-shrink:0;align-items:center;}

/* 装備強化 */
.enhance-row{display:flex;align-items:center;gap:5px;margin-top:4px;}
.enhance-lv{font-size:9px;color:var(--orange2);font-weight:700;}
.enhance-cost{font-size:8px;color:var(--gold2);}

/* ── SHOP ── */
.shop-item{background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  padding:8px;margin-bottom:5px;display:flex;align-items:center;gap:7px;}
.sp{font-size:10px;color:var(--gold2);font-weight:700;white-space:nowrap;}

/* ── TOAST ── */
.toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);
  background:var(--panel2);border:1px solid var(--border3);border-radius:7px;
  padding:6px 14px;font-size:11px;color:var(--text);z-index:500;
  animation:tIn .2s,tOut .2s 1.8s forwards;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.6);}
@keyframes tIn{from{opacity:0;transform:translate(-50%,-8px);}to{opacity:1;transform:translate(-50%,0);}}
@keyframes tOut{to{opacity:0;transform:translate(-50%,-8px);}}

/* ── MISC ── */
.erow{margin-bottom:7px;}
.elbl{font-size:8px;color:var(--text3);margin-bottom:2px;display:flex;justify-content:space-between;}
.etrk{height:4px;background:rgba(0,0,0,.4);border-radius:2px;overflow:hidden;}
.efil{height:100%;background:linear-gradient(90deg,#4020a0,#7040d8);border-radius:2px;transition:width .5s;}
.empty-st{text-align:center;padding:20px;color:var(--text3);font-size:10px;}
.evolve-ready{animation:eglow 1.5s infinite alternate;}
@keyframes eglow{from{box-shadow:0 0 5px rgba(232,184,76,.2);}to{box-shadow:0 0 14px rgba(232,184,76,.5);}}
.info-box{background:rgba(58,143,212,.08);border:1px solid rgba(58,143,212,.2);
  border-radius:6px;padding:7px 9px;font-size:9px;color:var(--text2);line-height:1.7;margin-bottom:7px;}
.warn-box{background:rgba(240,112,112,.08);border:1px solid rgba(240,112,112,.2);
  border-radius:6px;padding:5px 9px;font-size:9px;color:var(--red2);margin-bottom:5px;}
.title-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;
  background:linear-gradient(135deg,rgba(136,68,204,.2),rgba(170,102,238,.2));
  border:1px solid rgba(170,102,238,.4);color:var(--purple2);margin-left:6px;}
input[type=text]{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;
  padding:8px 10px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:12px;
  outline:none;width:100%;transition:border-color .15s;}
input[type=text]:focus{border-color:var(--blue2);}
</style>
</head>
<body>
<div id="app">
  <div id="topbar" style="display:none">
    <div id="char-mini">
      <div id="char-icon">⚔</div>
      <div>
        <div id="char-name">—</div>
        <div id="char-class-lv">—</div>
        <div id="title-tag"></div>
      </div>
    </div>
    <div id="top-stats">
      <div class="ts"><div class="ts-bar"><div id="tsf-hp" class="ts-fill tsf-hp" style="width:100%"></div></div><div class="ts-lbl">HP</div></div>
      <div class="ts"><div class="ts-bar"><div id="tsf-st" class="ts-fill tsf-st" style="width:0%"></div></div><div class="ts-lbl">CD</div></div>
      <div class="coins-disp">💰<span id="top-coins">0</span></div>
    </div>
  </div>
  <div id="content"></div>
  <nav id="nav" style="display:none">
    <button class="nb active" data-s="status" onclick="go('status')"><span class="nb-icon">📊</span><span>ステ</span></button>
    <button class="nb" data-s="quest"  onclick="go('quest')"> <span class="nb-icon">⚔</span><span>クエスト</span></button>
    <button class="nb" data-s="equip"  onclick="go('equip')"> <span class="nb-icon">🔰</span><span>装備</span></button>
    <button class="nb" data-s="shop"   onclick="go('shop')">  <span class="nb-icon">🏪</span><span>ショップ</span></button>
    <button class="nb boss-tab" data-s="boss" onclick="go('boss')"><span class="nb-icon">👹</span><span>挑戦</span></button>
    <button class="nb" data-s="class"  onclick="go('class')"> <span class="nb-icon">✨</span><span>職業</span></button>
  </nav>
</div>
<script>
// ═══════ CLASS TREE ═══════
const CT={
  swordsman:{name:'剣士',icon:'⚔',tier:0,desc:'バランス型の戦士',tags:['str'],
    growth:{hp:7,atk:4,def:4,spd:2,luk:2},base:{hp:120,atk:16,def:10,spd:6,luk:4},
    boost:['atk','def'],evolve1:['knight','hero'],skill:'斬撃'},
  mage:{name:'魔法使い',icon:'🧙',tier:0,desc:'魔法で大ダメージ',tags:['mag'],
    growth:{hp:3,atk:7,def:2,spd:4,luk:3},base:{hp:80,atk:22,def:5,spd:8,luk:5},
    boost:['atk','spd'],evolve1:['sage','sorcerer'],skill:'魔法弾'},
  cleric:{name:'僧侶',icon:'✚',tier:0,desc:'回復と支援に特化',tags:['heal'],
    growth:{hp:5,atk:2,def:4,spd:2,luk:5},base:{hp:100,atk:9,def:12,spd:5,luk:8},

// ═══════ STATE ═══════
let P=null, curScreen='title';

function newPlayer(name,classId){
  const cls=CT[classId],base=cls.base;
  return{name,classId,level:1,exp:0,expNext:50,
    hp:base.hp,maxHp:base.hp,
    coins:100,
    stats:{hp:base.hp,atk:base.atk,def:base.def,spd:base.spd,luk:base.luk},
    freePoints:0,
    equipped:{weapon:null,armor:null,acc:null},
    inventory:[],
    cleared:[],bossCleared:[],
    titles:[],activeTitle:null,
    lastQuest:null,
    lastBoss:null,
    lastQuestTime:0};
}

// 実効ステータス（装備+強化込み）
function getStats(){
  const s={...P.stats};
  let hpBonus=0;
  for(const sl of['weapon','armor','acc']){
    const eqId=P.equipped[sl];
    if(!eqId)continue;
    const entry=P.inventory.find(x=>x.id===eqId);
    const it=ITEMS[eqId];
    if(!it)continue;
    const eLv=entry?entry.enhLv||0:0;
    const mult=1+eLv*0.08;
    for(const k of['atk','def','spd','luk'])if(it[k])s[k]=(s[k]||0)+Math.floor(it[k]*mult);
    if(it.hp)hpBonus+=Math.floor(it.hp*mult);
  }
  s.maxHp=(P.maxHp||P.stats.hp*3)+hpBonus;
  return s;
}
function getCls(){return CT[P.classId];}

// ステポイント振り
function allocStat(key,delta){
  if(delta>0&&P.freePoints<=0)return;
  const cls=getCls();
  const boosted=cls.boost&&cls.boost.includes(key);
  const gain=boosted?2*delta:delta;
  const minV=CT[P.classId].base?.[key]??1;
  if(delta<0&&P.stats[key]<=minV)return;
  P.stats[key]+=gain;
  if(key==='hp'){P.maxHp+=gain*3;P.hp=Math.min(P.hp,P.maxHp);}
  P.freePoints-=delta;
  updateTopbar();renderStatus();
}

// クールダウン管理（5秒に1回クエスト可能）
const QUEST_CD=5000; // 5秒
setInterval(()=>{
  if(!P)return;
  updateTopbar();
  // battle中は再描画しない（バトル画面が消えるバグ防止）
  if(curScreen==='quest')renderQuest();
  else if(curScreen==='boss')renderBoss();
},500);

// ═══════ SAVE/LOAD ═══════
const SK='cof2_';
function saveGame(slot){
  if(!P)return;
  localStorage.setItem(SK+slot,JSON.stringify({P,ts:Date.now()}));
  toast(`スロット${slot}にセーブ完了`);
}
function loadGame(slot){
  const raw=localStorage.getItem(SK+slot);
  if(!raw){toast('セーブデータなし');return;}
  P=JSON.parse(raw).P;
  // 古いデータ互換性（inventory形式）
  if(P.inventory.length&&typeof P.inventory[0]==='string'){
    P.inventory=P.inventory.map(id=>({id,enhLv:0,fav:false}));
  }
  if(!P.bossCleared)P.bossCleared=[];
  if(!P.titles)P.titles=[];
  if(!P.activeTitle)P.activeTitle=null;
  if(!P.lastQuestTime)P.lastQuestTime=0;
  if(!P.lastQuest)P.lastQuest=null;
  if(!P.lastBoss)P.lastBoss=null;
  if(P.stamina===undefined)P.stamina=10;
  if(P.maxStamina===undefined)P.maxStamina=10;
  if(P.maxHp===undefined)P.maxHp=P.stats.hp*3;
  document.getElementById('topbar').style.display='flex';
  document.getElementById('nav').style.display='grid';
  updateTopbar();go('status');toast(`スロット${slot}からロード完了`);
}
function getSaveInfo(slot){
  const raw=localStorage.getItem(SK+slot);
  if(!raw)return null;
  const d=JSON.parse(raw),dt=new Date(d.ts);
  return{name:d.P.name,cls:CT[d.P.classId]?.name||'?',lv:d.P.level,
    date:`${dt.getMonth()+1}/${dt.getDate()} ${dt.getHours()}:${String(dt.getMinutes()).padStart(2,'0')}`};
}
function delSave(slot){
  if(!confirm(`スロット${slot}を削除しますか？`))return;
  localStorage.removeItem(SK+slot);renderTitle();
}

// ═══════ EQUIP HELPERS ═══════
function invFind(id){return P.inventory.find(x=>x.id===id);}
function invFindSlot(slot){return P.inventory.find(x=>x.id===P.equipped[slot]);}
function isEquipped(id){return Object.values(P.equipped).includes(id);}
function isFav(id){const e=invFind(id);return e&&e.fav;}

function autoEquip(){
  let cnt=0;
  for(const slot of['weapon','armor','acc']){
    const cands=[...new Set(P.inventory.filter(x=>ITEMS[x.id]?.slot===slot).map(x=>x.id))];
    if(!cands.length)continue;
    const score=id=>{
      const it=ITEMS[id],entry=invFind(id);
      const m=1+(entry?.enhLv||0)*0.05;
      return(it.atk||0)*m+(it.def||0)*m+(it.spd||0)*m+(it.luk||0)*m;
    };
    const best=cands.sort((a,b)=>score(b)-score(a))[0];
    if(P.equipped[slot]!==best){P.equipped[slot]=best;cnt++;}
  }
  updateTopbar();renderEquip();
  toast(cnt>0?`${cnt}箇所を最強装備に変更！`:'すでに最強装備です');
}

function sellBulk(){
  const before=P.inventory.length;
  const sold=[];
  P.inventory=P.inventory.filter(entry=>{
    if(isEquipped(entry.id)||entry.fav)return true;
    sold.push(entry);return false;
  });
  let gain=0;
  sold.forEach(entry=>{gain+=Math.max(10,Math.floor((ITEMS[entry.id]?.price||80)*0.4));});
  P.coins+=gain;
  updateTopbar();renderEquip();
  toast(`${sold.length}件を一括売却 +${gain}G`);
}

function toggleFav(id){
  const entry=invFind(id);
  if(!entry)return;
  entry.fav=!entry.fav;
  renderEquip();
  toast(entry.fav?'お気に入りに追加':'お気に入りを解除');
}

function enhanceItem(id){
  const entry=invFind(id);
  if(!entry)return;
  entry.enhLv=(entry.enhLv||0);
  const cost=enhanceCost(id,entry.enhLv);
  if(P.coins<cost){toast('ゴールドが足りません！');return;}
  P.coins-=cost;entry.enhLv++;
  updateTopbar();renderEquip();
  toast(`${ITEMS[id].name} を+${entry.enhLv}に強化！`);
}

function enhanceCost(id,currentLv){
  const it=ITEMS[id];
  const base={common:20,uncommon:60,rare:150,epic:400,legendary:1200,bossonly:3000}[it.rarity]||80;
  return Math.floor(base*Math.pow(1.3,currentLv));
}

// ═══════ NAVIGATION ═══════
function go(id){
  curScreen=id;
  // ゲーム開始後は常にnav/topbar表示
  document.getElementById('nav').style.display='grid';
  document.getElementById('topbar').style.display='flex';
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.dataset.s===id));
  ({status:renderStatus,quest:renderQuest,equip:renderEquip,shop:renderShop,boss:renderBoss,class:renderClass})[id]?.();
}
function updateTopbar(){
  if(!P)return;
  const cls=getCls();
  document.getElementById('char-icon').textContent=cls.icon;
  document.getElementById('char-name').textContent=P.name;
  document.getElementById('char-class-lv').textContent=`Lv.${P.level} ${cls.name}`;
  const titleEl=document.getElementById('title-tag');
  if(P.activeTitle){titleEl.textContent=`【${P.activeTitle}】`;titleEl.style.display='block';}
  else titleEl.style.display='none';
  const es2=getStats?getStats():P.stats;
  const displayHp=P.hp;
  const displayMaxHp=es2.maxHp||P.maxHp;
  document.getElementById('tsf-hp').style.width=(displayHp/displayMaxHp*100)+'%';
  const now2=Date.now();
  const cdElapsed=now2-(P.lastQuestTime||0);
  const cdPct=Math.min(100,cdElapsed/QUEST_CD*100);
  document.getElementById('tsf-st').style.width=cdPct+'%';
  document.getElementById('top-coins').textContent=P.coins.toLocaleString();
}

function renderTitle(){
  document.getElementById('topbar').style.display='none';
  document.getElementById('nav').style.display='none';
  const saves=[1,2,3].map(s=>{
    const info=getSaveInfo(s);
    if(!info)return`<div class="save-slot">
      <div class="save-slot-name" style="color:var(--text3);">空きスロット ${s}</div>
      <div class="save-slot-info">新規ゲーム</div>
      <div style="margin-top:6px;"><button class="btn btn-blue btn-sm btn-full" onclick="renderCreate(${s})">新規作成</button></div>
    </div>`;
    return`<div class="save-slot">
      <div class="save-slot-name">${info.name} <span style="font-size:9px;color:var(--text3);">[${s}]</span></div>
      <div class="save-slot-info">${info.cls} Lv.${info.lv} — ${info.date}</div>
      <div style="display:flex;gap:4px;margin-top:6px;">
        <button class="btn btn-gold btn-sm" style="flex:1;" onclick="loadGame(${s})">続きから</button>
        <button class="btn btn-ghost btn-xs" onclick="renderCreate(${s})">上書き</button>
        <button class="btn btn-red btn-xs" onclick="delSave(${s})">削除</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('content').innerHTML=`
    <div id="screen-title">
      <div class="game-logo">Chronicles<br>of Fate</div>
      <div class="game-sub">Browser RPG</div>
      <div style="width:100%;max-width:340px;">${saves}</div>
    </div>`;
}

  P=newPlayer(cName.trim(),cClass);
  document.getElementById('topbar').style.display='flex';
  document.getElementById('nav').style.display='grid';
  updateTopbar();go('status');toast('冒険を始めよう！');
}

function renderQuest(){
  const now=Date.now();
  const cdElapsed=now-(P.lastQuestTime||0);

  const cdReady=cdElapsed>=QUEST_CD;

  // 最近行ったクエストを取得

  const questCard=(q,i,isPinned)=>{
    const cleared=P.cleared.includes(q.id);
    const locked=!isPinned&&i>0&&!P.cleared.includes(QUESTS[i-1].id);
    const under=P.level<q.rec-3;
    const onclickStr=locked?'':(cdReady?`startQuest('${q.id}')`:`toast('クールダウン中！ あと${cdLeft}秒')`);
    return`<div class="qcard${locked?' locked':''}" onclick="${onclickStr}" style="${isPinned?'border-color:var(--gold2);background:rgba(232,184,76,.05);':''}">

          <span class="qrew">EXP+${q.exp} 💰+${q.gold}</span>
        </div>
      </div>
      <span class="qbadge ${cleared?'b-clear':locked?'b-lock':'b-new'}">${cleared?'CLEAR':locked?'LOCK':'NEW'}</span>
    </div>`;
  };

  document.getElementById('content').innerHTML=`
    <div class="panel"><div class="pt">⏱ クエストクールダウン</div>
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px;">
        <div style="flex:1;height:8px;background:rgba(0,0,0,.4);border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${cdPct}%;background:${cdReady?'linear-gradient(90deg,#20a050,#40d070)':'linear-gradient(90deg,#b08020,#f0b030)'};border-radius:4px;transition:width .3s;"></div>
        </div>
        <span style="font-size:11px;color:${cdReady?'var(--green2)':'var(--stamina)'};font-weight:700;">${cdReady?'GO！':cdLeft+'秒'}</span>
      </div>
      <div style="font-size:8px;color:var(--text3);">5秒に1回クエストに挑戦できます</div>
    </div>
    ${lastQ?`<div class="panel" style="border-color:rgba(232,184,76,.4);padding:7px 10px;">
      <div style="font-size:8px;color:var(--gold2);margin-bottom:4px;">⭐ 最近のクエスト</div>
      ${questCard(lastQ, QUESTS.indexOf(lastQ), true)}
    </div>`:''}
    <div class="panel"><div class="pt">📜 クエスト一覧</div>
      ${QUESTS.map((q,i)=>questCard(q,i,false)).join('')}
    </div>`;
}

// ═══════ BATTLE ENGINE (共通) ═══════
function startQuest(questId){
  const q=QUESTS.find(x=>x.id===questId);
  if(!q)return;
  const now=Date.now();
  if(now-(P.lastQuestTime||0)<QUEST_CD){toast('クールダウン中！ あと'+(Math.ceil((QUEST_CD-(now-(P.lastQuestTime||0)))/1000))+'秒');return;}
  P.lastQuestTime=Date.now();
  P.lastQuest=questId;
  updateTopbar();
  openBattle({name:q.name,enemy:q.enemy,isBoss:false,questId,bossId:null});
}
function startBoss(bossId){
  const b=BOSSES.find(x=>x.id===bossId);
  if(!b)return;
  const now=Date.now();
  if(now-(P.lastQuestTime||0)<QUEST_CD){toast('クールダウン中！ あと'+(Math.ceil((QUEST_CD-(now-(P.lastQuestTime||0)))/1000))+'秒');return;}
  P.lastQuestTime=Date.now();
  P.lastBoss=bossId;
  updateTopbar();
  openBattle({name:b.name,enemy:b.enemy,isBoss:true,questId:null,bossId});
}

            <div class="chp-t"><div class="chp-f chp-p" id="php" style="width:100%"></div></div>
            <div class="chp-n" id="phn">${P.hp}/${(()=>{const s=getStats();return s.maxHp||P.maxHp;})()}</div>

async function runBattle(questId,bossId,skip){
  const isBoss=!!bossId;
  const q=isBoss?BOSSES.find(x=>x.id===bossId):QUESTS.find(x=>x.id===questId);
  const es=getStats();
  const effectiveMaxHp=es.maxHp||P.maxHp;
  // HPを実効最大HPでクランプ
  if(P.hp>effectiveMaxHp)P.hp=effectiveMaxHp;
  document.getElementById('bact').innerHTML=`<span style="color:var(--text3);font-size:9px;">戦闘中…</span>`;

  let pHp=P.hp, eHp=q.enemy.hp;
  // ボス特殊: ATK増加型
  let bossAtkBonus=0;
  const log=[];
  const logAdd=(msg,cls='')=>{
    log.push({msg,cls});
    if(!skip){const el=document.getElementById('blog');if(el){el.innerHTML+=`<div class="ll ${cls}">${msg}</div>`;el.scrollTop=el.scrollHeight;}}
  };
  const updBars=()=>{
    const ph=document.getElementById('php'),eh=document.getElementById('ehp');
    const pn=document.getElementById('phn'),en=document.getElementById('ehn');
    if(ph)ph.style.width=Math.max(0,pHp/effectiveMaxHp*100)+'%';
    if(eh)eh.style.width=Math.max(0,eHp/q.enemy.hp*100)+'%';
    if(pn)pn.textContent=`${Math.max(0,Math.round(pHp))}/${effectiveMaxHp}`;
    if(en)en.textContent=`${Math.max(0,Math.round(eHp))}/${q.enemy.hp}`;
  };
  const delay=ms=>new Promise(r=>setTimeout(r,ms));

  // 装備フラグ
  const wpn=P.equipped.weapon,arm=P.equipped.armor,acc=P.equipped.acc;
  const hasRegen=arm==='angelicArmor'||arm==='godArmor'||arm==='guardianShield'||arm==='seaKingArmor'||arm==='phoenixArmor'||arm==='celestialArmor'||arm==='godlikeArmor';
  const hasSoul=wpn==='soulEdge'||wpn==='abyssalBlade';
  const hasDrArmor=arm==='dragonArmor'||arm==='godArmor'||arm==='guardianShield'||arm==='seaKingArmor'||arm==='phoenixArmor'||arm==='celestialArmor'||arm==='godlikeArmor';
  const hasBoots=acc==='rogueBoots';
  const hasFang=acc==='dragonFang'||acc==='armageddonRing'||acc==='eternityRing'||acc==='cosmicRing';
  const hasDeep=acc==='deepSeaRing';
  const hasIgnis=acc==='ignisShard';const hasDemon=acc==='demonCore';const hasChaos=acc==='chaosCore';
  const hasPrimordial=acc==='primordialCore';
  // パッシブスキル適用
  const pSkill=SKILLS[getCls().skill]||{};
  let atkMult=1;
  if(pSkill.type==='passive'&&pSkill.allStatBonus){
    // 全ステ+20%: atkMult等に反映
    atkMult*=pSkill.allStatBonus;
  }
  if(hasIgnis)atkMult*=1.1;if(hasDemon)atkMult*=1.15;if(hasChaos)atkMult*=1.1;if(hasPrimordial)atkMult*=1.2;
  // ボスドロップ武器ボーナス
  if(['infernoSword','godSlayer','divineSword'].includes(wpn))atkMult*=(wpn==='divineSword'?1.5:wpn==='godSlayer'?1.3:1.2);
  if(['huntersEdge'].includes(wpn))atkMult*=1.0; // 会心ダメで補完

  // 防御軽減
  let dmgReduce=1;
  if(pSkill.type==='passive'&&pSkill.dmgReduce){dmgReduce-=pSkill.dmgReduce;}
  if(arm==='dragonArmor')dmgReduce=Math.max(0.3,dmgReduce-0.10);
  if(arm==='godArmor')dmgReduce=Math.max(0.3,dmgReduce-0.15);
  if(arm==='guardianShield')dmgReduce=Math.max(0.3,dmgReduce-0.20);
  if(arm==='seaKingArmor')dmgReduce=Math.max(0.3,dmgReduce-0.18);
  if(arm==='phoenixArmor')dmgReduce=Math.max(0.3,dmgReduce-0.15);
  if(arm==='celestialArmor')dmgReduce=Math.max(0.25,dmgReduce-0.25);
  if(arm==='godlikeArmor')dmgReduce=Math.max(0.2,dmgReduce-0.30);

  const isHealer=['cleric','archpriest','paladin','godPriest','holyKnight'].includes(P.classId);
  // ボス会心無効フラグ
  const bossNoCrit=isBoss&&bossId==='b04';

  let round=0;
  while(pHp>0&&eHp>0){
    round++;
    if(round>150){logAdd('長期戦！引き分け…','ls');break;}

    // 連続攻撃回数（SPD依存）
    const hits=Math.min(5,1+Math.floor(es.spd/20)+(pSkill.type==='passive'&&pSkill.extraHit?pSkill.extraHit:0));
    for(let h=0;h<hits;h++){
      if(eHp<=0)break;
      let pAtk=Math.max(1,Math.round(es.atk*atkMult)-Math.floor(q.enemy.def*0.45)+Math.floor(Math.random()*5-2));
      // ボス毎ターンATK上昇
      if(q.enemy.special&&q.enemy.special.includes('ATK+10'))bossAtkBonus+=0; // 敵側
      // huntersEdge: SPD依存追加ダメ
      if(wpn==='huntersEdge')pAtk+=Math.floor(es.spd*0.5);
      const critRate=(bossNoCrit?0:es.luk*0.5+3)+(hasFang?15:0)+(hasDeep?10:0)+(acc==='cosmicRing'?30:0)+(pSkill.type==='passive'&&pSkill.critBonus?pSkill.critBonus:0);
      const crit=!bossNoCrit&&Math.random()*100<critRate;
      const critMult=wpn==='huntersEdge'?2.5:wpn==='divineSword'?3:1.9;
      if(crit)pAtk=Math.floor(pAtk*critMult);
      if(hasSoul){const dot=Math.floor(eHp*(wpn==='abyssalBlade'?0.05:0.03));eHp-=dot;}
      eHp-=pAtk;
      if(hits>1){logAdd(`　${h+1}撃目: ${pAtk}ダメ${crit?'🌟':''}${hasSoul?'＋DoT':''}`,crit?'la lsp':'la');}
      else{logAdd(crit?`🌟 クリティカル！ ${q.enemy.name}に ${pAtk}ダメ！`:`あなたの攻撃！ ${q.enemy.name}に ${pAtk}ダメ`,'la');}
    }
    if(hits>1)logAdd(`⚡ ${hits}連続攻撃！`,'lsp');
    // スキル発動
    const sk=SKILLS[getCls().skill];
    if(sk&&eHp>0){
      if(sk.type==='proc'&&Math.random()*100<sk.chance){
        let sDmg=Math.max(1,Math.round(es.atk*sk.atkMult*atkMult)-Math.floor(q.enemy.def*0.3));
        eHp-=sDmg;
        logAdd(`✨ スキル「${getCls().skill}」発動！ ${sDmg}ダメ！`,'lsp');
      }else if(sk.type==='holy'&&Math.random()*100<sk.chance){
        let sDmg=Math.max(1,Math.round(es.atk*sk.atkMult*atkMult)-Math.floor(q.enemy.def*0.3));
        eHp-=sDmg;
        const sHeal=Math.floor((sk.healPct||0.05)*effectiveMaxHp);
        pHp=Math.min(effectiveMaxHp,pHp+sHeal);
        logAdd(`✨ スキル「${getCls().skill}」！ ${sDmg}ダメ＋HP+${sHeal}`,'lsp');
      }
    }

    if(!skip){updBars();await delay(260);}
    if(eHp<=0)break;

    // 自動回復
    if(hasRegen){
      const rg=Math.floor(effectiveMaxHp*(arm==='godlikeArmor'?0.08:arm==='celestialArmor'?0.06:0.03));
      pHp=Math.min(effectiveMaxHp,pHp+rg);logAdd(`👼 自動回復 +${rg}HP`,'lh');
    }
    // ボス特殊: HP回復
    if(isBoss&&q.enemy.special&&q.enemy.special.includes('自動回復+50')){
      eHp=Math.min(q.enemy.hp,eHp+50);logAdd(`💢 ${q.enemy.name}が回復！`,'lboss');
    }
    if(isBoss&&q.enemy.special&&q.enemy.special.includes('HP5%回復')){
      const rg=Math.floor(q.enemy.hp*0.05);eHp=Math.min(q.enemy.hp,eHp+rg);
      logAdd(`💢 ${q.enemy.name}が大回復！(+${rg})`,'lboss');
    }
    // ボス特殊: ATK上昇
    if(isBoss&&q.enemy.special&&q.enemy.special.includes('ATK+10')){
      bossAtkBonus+=10;
      if(bossAtkBonus%30===10)logAdd(`💢 ${q.enemy.name}のATKが上昇！`,'lboss');
    }
    // ボス特殊: 全体攻撃（3ターンに1回、1.5倍）
    let eBaseAtk=q.enemy.atk+bossAtkBonus;
    if(isBoss&&q.enemy.special&&q.enemy.special.includes('全体攻撃')&&round%3===0){
      eBaseAtk=Math.floor(eBaseAtk*1.5);
      logAdd(`💢 ${q.enemy.name}の全体攻撃！`,'lboss');
    }
    let eAtk=Math.max(1,eBaseAtk-Math.floor(es.def*0.45)+Math.floor(Math.random()*5-2));
    eAtk=Math.floor(eAtk*dmgReduce);
    const dodgeRate=es.spd*0.3+(hasBoots?20:0)+(pSkill.type==='passive'&&pSkill.dodgeBonus?pSkill.dodgeBonus:0);
    if(!bossNoCrit&&Math.random()*100<dodgeRate){
      logAdd(`💨 回避！ ${q.enemy.name}の攻撃をかわした`,'ld');
    } else {
      pHp-=eAtk;
      logAdd(`${q.enemy.name}の攻撃！ あなたに ${eAtk}ダメ`,'');
    }
    if(isHealer&&round%3===0){
      const healMult=(pSkill.type==='passive'&&pSkill.healBonus)?pSkill.healBonus:1;
      const heal=Math.floor((es.luk*2+15)*healMult);
      pHp=Math.min(effectiveMaxHp,pHp+heal);
      logAdd(`💚 ${getCls().skill}で ${heal}HP回復！`,'lh');
    }
    if(!skip){updBars();await delay(260);}
  }

  if(skip)updBars();
  const won=eHp<=0;
  P.hp=effectiveMaxHp;

  if(won){
    if(isBoss){
      // ボス勝利処理
      const b=BOSSES.find(x=>x.id===bossId);
      P.exp+=b.reward.exp;P.coins+=b.reward.gold;
      logAdd('','');logAdd(`✅ ボス討伐！`,'ls');
      logAdd(`EXP +${b.reward.exp}  💰 +${b.reward.gold}`,'ls');
      // 称号付与
      if(!P.bossCleared.includes(bossId)){
        P.bossCleared.push(bossId);
        if(b.title&&!P.titles.includes(b.title)){
          P.titles.push(b.title);
          if(!P.activeTitle)P.activeTitle=b.title;
          logAdd(`🏆 称号獲得：【${b.title}】`,'ls');
        }
      }
      // ボスドロップ（3-8%）
      const bDrops=[];
      b.bossDrops.forEach(id=>{
        const it=ITEMS[id];
        const rate=it.rarity==='bossonly'?0.05:0.08;
        if(Math.random()<rate){P.inventory.push({id,enhLv:0,fav:false});bDrops.push(it.name);}
      });
      if(bDrops.length)logAdd(`💎 ボスドロップ！: ${bDrops.join('、')}`,'lboss');
      // レベルアップ
      while(P.exp>=P.expNext){doLevelUp(logAdd);}
    } else {
      const q2=QUESTS.find(x=>x.id===questId);
      const expGain=q2.exp,goldGain=q2.gold+Math.floor(Math.random()*q2.gold*0.25);
      P.exp+=expGain;P.coins+=goldGain;
      const lukBonus=Math.min(0.3,(getStats().luk-4)*0.003);
      const drops=[];
      q2.drops.forEach(id=>{
        const it=ITEMS[id];if(!it)return;
        const base={legendary:0.01,epic:0.03,rare:0.06,uncommon:0.10,common:0.10}[it.rarity]||0.08;
        if(Math.random()<Math.min(base+lukBonus,base*2)){P.inventory.push({id,enhLv:0,fav:false});drops.push(it.name);}
      });
      logAdd('','');logAdd('✅ 勝利！','ls');
      logAdd(`EXP +${expGain}  💰 +${goldGain}`,'ls');
      if(drops.length)logAdd(`💎 ドロップ: ${drops.join('、')}`,'llt');
      else logAdd('（ドロップなし）','');
      if(!P.cleared.includes(questId))P.cleared.push(questId);
      while(P.exp>=P.expNext){doLevelUp(logAdd);}
    }
  } else {
    logAdd('','');logAdd('💀 敗北…','ls');
    const ce=Math.floor(q.reward?.exp||q.exp||100)*0.15;
    P.exp+=Math.floor(ce);logAdd(`EXP +${Math.floor(ce)}（敗北ボーナス）`,'ls');
    while(P.exp>=P.expNext){doLevelUp(logAdd);}
  }

  updateTopbar();
  const ae=document.getElementById('bact');
  if(ae)ae.innerHTML=`
    <div style="width:100%;text-align:center;padding:8px 0 4px;">
      <div style="font-size:28px;margin-bottom:4px;">${won?'🏆':'💀'}</div>
      <div style="font-family:'Cinzel',serif;font-size:${won?'18':'16'}px;color:${won?'var(--gold2)':'var(--red2)'};font-weight:700;margin-bottom:8px;">
        ${won?'VICTORY！':'DEFEAT...'}
      </div>
      <button class="btn btn-${won?'gold':'red'} btn-full" onclick="go('${isBoss?'boss':'quest'}')">
        ${won?'✅ 完了':'💀 リトライ'} → ${isBoss?'挑戦':'クエスト'}一覧に戻る
      </button>
    </div>`;
  if(skip){
    const le=document.getElementById('blog');
    if(le){le.innerHTML=log.map(l=>`<div class="ll ${l.cls}">${l.msg||'　'}</div>`).join('');le.scrollTop=le.scrollHeight;}
  }
}

function doLevelUp(logAdd){
  P.exp-=P.expNext;P.level++;
  P.expNext=Math.floor(P.expNext*1.18+P.level*5);
  const g=CT[P.classId].growth;
  P.stats.hp+=g.hp;P.maxHp+=g.hp*3;
  P.stats.atk+=g.atk;P.stats.def+=g.def;P.stats.spd+=g.spd;P.stats.luk+=g.luk;
  P.hp=P.maxHp;
  P.freePoints+=3;
  logAdd(`🎉 Lv.${P.level}に上がった！ +3P スキル発動・ステータス上昇！`,'ls');
  if(P.level===20||P.level===40)logAdd('⭐ 職業進化が解放！ 職業タブを確認！','ls');
}

// ═══════ EQUIP ═══════
function renderEquip(){
  const slLabels={weapon:'⚔ 武器',armor:'🔰 防具',acc:'💍 アクセサリ'};
  const uniqueIds=[...new Set(P.inventory.map(x=>x.id))];

  document.getElementById('content').innerHTML=`
    <div class="panel"><div class="pt">🎒 現在の装備</div>
      <div class="eslots">
        ${Object.entries(slLabels).map(([slot,label])=>{
          const id=P.equipped[slot];const it=ITEMS[id];const entry=invFind(id);
          return`<div class="eslot ${it?'has-item':''}" onclick="${it?`unequipItem('${slot}')`:''}" title="${it?'タップで外す':''}">
            <div class="esl-lbl">${label}</div>
            ${it?`<div class="esl-name">${it.icon} ${it.name}${entry&&entry.enhLv?' <span style=color:var(--orange2)>+'+entry.enhLv+'</span>':''}</div>
                  <div class="esl-stats">${statLine(it,entry?.enhLv||0)}</div>
                  ${it.special?`<div style="font-size:7px;color:var(--cyan2);margin-top:1px;">${it.special}</div>`:''}
                  <div style="font-size:7px;color:var(--red2);margin-top:1px;">タップで外す</div>`
                :`<div class="esl-empty">空</div>`}
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:4px;margin-top:2px;">
        <button class="btn btn-cyan btn-sm" style="flex:1;" onclick="autoEquip()">⚡ 最強自動装備</button>
        <button class="btn btn-orange btn-sm" style="flex:1;" onclick="if(confirm('装備中・お気に入り以外を全て売却しますか？'))sellBulk()">💰 一括売却</button>
      </div>
    </div>
    <div class="panel"><div class="pt">🎒 所持品（${P.inventory.length}件）</div>
      ${P.inventory.length===0?`<div class="empty-st">アイテムがありません<br>クエストでドロップを狙おう！</div>`:`
      <div class="ilist">
        ${uniqueIds.map(id=>{
          const it=ITEMS[id];if(!it)return'';
          const entries=P.inventory.filter(x=>x.id===id);
          const cnt=entries.length;
          const entry=entries[0];
          const eEq=isEquipped(id);
          const eFav=entry?.fav;
          const eLv=entry?.enhLv||0;
          const nextCost=enhanceCost(id,eLv);
          return`<div class="irow">
            <div class="iicon">${it.icon}</div>
            <div class="iinfo">
              <div class="iname">${it.name}${cnt>1?` ×${cnt}`:''}${eLv>0?` <span style="color:var(--orange2);font-weight:700;">+${eLv}</span>`:''} ${eEq?`<span class="eq-badge">装備中</span>`:''}</div>
              <div class="istats">${statLine(it,eLv)}</div>
              ${it.special?`<div class="sp-badge">${it.special}</div>`:''}
              <div class="irarity r-${it.rarity}">${RL[it.rarity]}</div>
              <div class="enhance-row">
                <span class="enhance-lv">強化+${eLv}</span>
                <button class="btn btn-orange btn-xs" onclick="enhanceItem('${id}')">強化 💰${nextCost.toLocaleString()}</button>
              </div>
            </div>
            <div class="iact">
              <span class="fav-badge" onclick="toggleFav('${id}')" title="${eFav?'お気に入り解除':'お気に入り追加'}">${eFav?'⭐':'☆'}</span>
              ${eEq?`<button class="btn btn-ghost btn-xs" onclick="unequipItem('${it.slot}')">外す</button>`
                   :`<button class="btn btn-blue btn-xs" onclick="equipItem('${id}')">装備</button>`}
              ${eEq||eFav
                ?`<button class="btn btn-ghost btn-xs" style="opacity:.3;cursor:not-allowed;" title="売却不可">売</button>`
                :`<button class="btn btn-ghost btn-xs" onclick="sellItem('${id}')">売</button>`}
            </div>
          </div>`;
        }).join('')}
      </div>`}
    </div>`;
}

function equipItem(id){
  const it=ITEMS[id];if(!it)return;
  P.equipped[it.slot]=id;updateTopbar();renderEquip();toast(`${it.name} を装備！`);
}
function unequipItem(slot){P.equipped[slot]=null;updateTopbar();renderEquip();}
function sellItem(id){
  if(isEquipped(id)){toast('装備中は売却できません！');return;}
  if(isFav(id)){toast('お気に入りは売却できません！');return;}
  const idx=P.inventory.findIndex(x=>x.id===id);if(idx<0)return;
  P.inventory.splice(idx,1);
  const price=Math.max(10,Math.floor((ITEMS[id].price||80)*0.4));
  P.coins+=price;updateTopbar();renderEquip();toast(`${ITEMS[id].name}を売却 (+${price}G)`);
}

// ═══════ SHOP ═══════
function renderShop(){
  const cleared=P.cleared.length;
  const shopItems=Object.entries(ITEMS).filter(([,v])=>v.shop&&(v.shopReq||0)<=cleared).map(([k])=>k);
  const locked=Object.entries(ITEMS).filter(([,v])=>v.shop&&(v.shopReq||0)>cleared).map(([k,v])=>({k,v}));
  document.getElementById('content').innerHTML=`
    <div class="panel"><div class="pt">💰 所持金</div>
      <div style="font-size:18px;font-weight:700;color:var(--gold2);">💰 ${P.coins.toLocaleString()} G</div>
      <div style="font-size:8px;color:var(--text3);margin-top:4px;">クエストを進めると新商品が解放されます（現在${cleared}クエストクリア済み）</div>
    </div>
    <div class="panel"><div class="pt">🏪 商品一覧</div>
      ${shopItems.map(id=>{
        const it=ITEMS[id],ok=P.coins>=it.price;
        return`<div class="shop-item" style="opacity:${ok?1:.45}">
          <div class="iicon">${it.icon}</div>
          <div class="iinfo" style="flex:1;">
            <div class="iname">${it.name}</div>
            <div class="istats">${statLine(it,0)}</div>
            <div class="irarity r-${it.rarity}">${RL[it.rarity]}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;">
            <div class="sp">💰${it.price.toLocaleString()}</div>
            <button class="btn btn-gold btn-xs" onclick="buyItem('${id}')" ${ok?'':'disabled'}>購入</button>
          </div>
        </div>`;
      }).join('')}
      ${locked.length?`<div style="font-size:9px;color:var(--text3);margin-top:8px;padding:6px;background:rgba(0,0,0,.2);border-radius:6px;">
        🔒 あと${locked[0].v.shopReq-cleared}クエストクリアで新商品解放
      </div>`:''}
    </div>`;
}
function buyItem(id){
  const it=ITEMS[id];
  if(P.coins<it.price){toast('お金が足りません！');return;}
  P.coins-=it.price;P.inventory.push({id,enhLv:0,fav:false});
  updateTopbar();renderShop();toast(`${it.name} を購入！`);
}

// ═══════ BOSS ═══════
function renderBoss(){
  const now=Date.now();
  const cdElapsed=now-(P.lastQuestTime||0);
  const cdReady=cdElapsed>=QUEST_CD;
  const cdLeft=Math.max(0,Math.ceil((QUEST_CD-cdElapsed)/1000));
  const lastB=P.lastBoss?BOSSES.find(b=>b.id===P.lastBoss):null;
  const bossCard=(b,isPinned)=>{
    const cleared=P.bossCleared.includes(b.id);
    const under=P.level<b.rec-5;
    return`<div class="boss-card" style="${isPinned?'border-color:var(--gold2);background:rgba(232,184,76,.03);':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
        <div>
          <div class="boss-name">${isPinned?'⭐ ':''}${b.enemy.icon} ${b.name}</div>
          <div class="boss-desc">${b.desc}</div>
        </div>
        ${cleared?'<span class="boss-clear-badge">討伐済み</span>':''}
      </div>
      <div class="boss-stats">
        <span>HP: ${b.enemy.hp.toLocaleString()}</span>
        <span>ATK: ${b.enemy.atk}</span>
        <span>DEF: ${b.enemy.def}</span>
        <span>推奨Lv.${b.rec}${under?' <span style="color:var(--red2);">⚠</span>':''}</span>
      </div>
      <div class="boss-reward">
        🏆 称号: 【${b.title}】<br>
        💎 ドロップ: ${b.bossDrops.map(id=>ITEMS[id]?.name||id).join('、')}（各5〜8%）<br>
        ⚔ 特殊: ${b.enemy.special}
      </div>
      <div style="display:flex;gap:5px;align-items:center;">
        <button class="btn btn-boss" style="flex:1;${under?'opacity:.6':''}" onclick="cdReady?startBoss('${b.id}'):toast('クールダウン中！ あと'+cdLeft+'秒')">
          ${cdReady?'✅':'⏱'} ${under?'⚠ ':''} 挑戦
        </button>
        <div style="font-size:9px;color:${cdReady?'var(--green2)':'var(--stamina)'};">${cdReady?'GO！':cdLeft+'秒後'}</div>
      </div>
    </div>`;
  };
  document.getElementById('content').innerHTML=`
    <div class="panel" style="border-color:rgba(204,51,102,.4);background:linear-gradient(135deg,#1a0820,#1e0d28);">
      <div class="pt" style="color:var(--boss2);">👹 ボス挑戦</div>
      <div class="info-box">強力なボスに挑戦して<b>称号</b>と<b>ボス専用装備</b>を獲得しよう！<br>
      ボス装備は通常ドロップより大幅に強力。ドロップ率は5〜8%。</div>
    </div>
    ${lastB?`<div class="panel" style="border-color:rgba(232,184,76,.4);padding:7px 10px;">
      <div style="font-size:8px;color:var(--gold2);margin-bottom:4px;">⭐ 最近挑戦したボス</div>
      ${bossCard(lastB,true)}
    </div>`:''}
    ${BOSSES.map(b=>bossCard(b,false)).join('')}`;
}

// ═══════ CLASS ═══════
function renderClass(){
  const cls=getCls();
  const canEv1=P.level>=20&&cls.tier===0;
  const canEv2=P.level>=40&&cls.tier===1;
  const canEv=canEv1||canEv2;

  document.getElementById('content').innerHTML=`
    <div class="panel ${canEv?'evolve-ready':''}">
      <div class="pt">✨ 現在の職業</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:7px;">
        <div style="font-size:40px;">${cls.icon}</div>
        <div>
          <div style="font-family:'Cinzel',serif;font-size:14px;color:var(--gold2);">${cls.name}</div>
          <div style="font-size:9px;color:var(--text2);margin-top:1px;">${cls.desc}</div>
          <div style="font-size:9px;color:var(--purple2);margin-top:1px;">スキル: ${cls.skill}</div>
          ${SKILLS[cls.skill]?`<div style="font-size:8px;color:var(--cyan2);margin-top:2px;background:rgba(34,192,216,.08);padding:3px 5px;border-radius:4px;">⚡ ${SKILLS[cls.skill].desc}</div>`:''}
          <div style="font-size:9px;color:var(--gold2);margin-top:1px;">✦ 得意: ${cls.boost.map(b=>BN[b]).join('・')}</div>
        </div>
      </div>
      <div style="font-size:8px;color:var(--text3);">成長率 HP+${cls.growth.hp} ATK+${cls.growth.atk} DEF+${cls.growth.def} SPD+${cls.growth.spd} LUK+${cls.growth.luk}</div>
    </div>

    ${canEv?`
    <div class="panel">
      <div class="pt" style="color:var(--gold2);">⭐ 職業進化！</div>
      <div style="font-size:9px;color:var(--text2);margin-bottom:7px;">進化先を選んでください。取り消せません。<br>進化時：全ステータス大幅上昇＋成長率アップ＋+5ポイント</div>
      <div class="class-grid">
        ${cls.evolve1.map(eid=>{const ec=CT[eid];
          return`<div class="cc" onclick="evolveClass('${eid}')">
            <div class="ci">${ec.icon}</div><div class="cn">${ec.name}</div>
            <div class="cd">${ec.desc}</div>
            <div class="tags">${ec.tags.map(t=>`<span class="tag tag-${t}">${TL[t]}</span>`).join('')}</div>
            <div style="margin-top:3px;font-size:7px;color:var(--gold2);">✦ 得意: ${ec.boost.map(b=>BN[b]).join('・')}</div>
            <div style="font-size:7px;color:var(--purple2);">スキル: ${ec.skill}</div>
            ${SKILLS[ec.skill]?`<div style="font-size:7px;color:var(--cyan2);margin-top:2px;">${SKILLS[ec.skill].desc}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`:`
    <div class="panel"><div class="pt">🗺️ 次の進化</div>
      ${cls.tier===0?`→ <span style="color:var(--gold2);">${cls.evolve1.map(id=>CT[id].name).join(' / ')}</span> <span style="color:var(--text3);">（Lv.20）</span>`
      :cls.tier===1?`→ <span style="color:var(--gold2);">${cls.evolve1.map(id=>CT[id]?.name||'???').join(' / ')}</span> <span style="color:var(--text3);">（Lv.40）</span>`
      :`<span style="color:var(--green2);">🌟 最終形態に到達！</span>`}
    </div>`}

    <div class="panel"><div class="pt">📜 全職業ツリー</div>
      ${BASE.map(bid=>{const bc=CT[bid];
        return`<div style="margin-bottom:7px;">
          <span style="font-size:13px;">${bc.icon}</span>
          <span style="font-family:'Cinzel',serif;font-size:10px;color:${P.classId===bid?'var(--gold2)':'var(--text2)'};">${bc.name}</span>
          <div style="padding-left:16px;font-size:8px;color:var(--text3);margin-top:1px;">
            ${bc.evolve1.map(e1=>{const c1=CT[e1];
              return`→<span style="color:${P.classId===e1?'var(--gold2)':'var(--text3)'};">${c1.icon}${c1.name}</span>
              ${c1.evolve1.map(e2=>{const c2=CT[e2];
                return` →<span style="color:${P.classId===e2?'var(--gold2)':'var(--text3)'};">${c2.icon}${c2.name}</span>`;
              }).join('')}　`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function evolveClass(newId){
  if(!confirm(`${CT[newId].name}に進化しますか？`))return;
  P.classId=newId;
  const ng=CT[newId].growth;
  // 進化ボーナス：成長率×5レベル分 + 全ステ大幅上昇
  P.stats.hp +=ng.hp*5;  P.maxHp+=ng.hp*15;
  P.stats.atk+=ng.atk*5; P.stats.def+=ng.def*5;
  P.stats.spd+=ng.spd*5; P.stats.luk+=ng.luk*5;
  P.hp=P.maxHp;
  P.freePoints+=5;
  updateTopbar();renderClass();toast(`✨ ${CT[newId].name} に進化！ ステータス大幅上昇！`);
}

// ═══════ UTILS ═══════
function statLine(it,enhLv=0){
  const m=1+enhLv*0.08;
  const p=[];
  if(it.hp)p.push(`HP+${Math.floor(it.hp*m)}`);
  if(it.atk)p.push(`ATK+${Math.floor(it.atk*m)}`);
  if(it.def)p.push(`DEF+${Math.floor(it.def*m)}`);
  if(it.spd)p.push(`SPD${it.spd>=0?'+':''}${Math.floor(it.spd*m)}`);
  if(it.luk)p.push(`LUK+${Math.floor(it.luk*m)}`);
  return p.join(' ')||'—';
}
function toast(msg){
  const el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2200);
}

renderTitle();
</script>
