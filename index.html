<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Chronicles of Fate</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');
:root{
  --bg:#0c0a0f;--bg2:#12101a;--bg3:#1a1625;
  --panel2:#1e1a2e;--border:#2e2845;--border2:#3d3560;
  --gold:#c9a84c;--gold2:#e8c96a;
  --red:#c94c4c;--red2:#e86a6a;
  --blue:#4c7ac9;--blue2:#6a9ae8;
  --green:#4caa6a;--green2:#6aca8a;
  --purple:#8a4cc9;--purple2:#aa6ae8;
  --text:#d4cfe8;--text2:#9890b8;--text3:#6a6288;
  --stamina-col:#e8aa44;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;
  min-height:100vh;display:flex;justify-content:center;align-items:flex-start;overflow-x:hidden;}
#app{width:390px;max-width:100vw;min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
#app::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 20% 20%,rgba(80,60,140,0.15) 0%,transparent 60%),
  radial-gradient(ellipse at 80% 80%,rgba(60,40,120,0.12) 0%,transparent 60%);
  pointer-events:none;z-index:0;}

/* TOP BAR */
#topbar{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 8px;background:linear-gradient(180deg,#0e0b16,var(--bg2));
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;flex-shrink:0;}
#char-mini{display:flex;align-items:center;gap:8px;}
#char-icon{width:36px;height:36px;border-radius:8px;background:var(--bg3);
  border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:20px;}
#char-info{display:flex;flex-direction:column;gap:1px;}
#char-name{font-family:'Cinzel',serif;font-size:13px;color:var(--gold2);font-weight:600;line-height:1;}
#char-class{font-size:11px;color:var(--text2);}
#top-stats{display:flex;gap:10px;align-items:center;}
.top-stat{display:flex;flex-direction:column;align-items:center;gap:1px;}
.top-stat-bar{width:52px;height:5px;background:#1a1625;border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.top-stat-fill{height:100%;border-radius:3px;transition:width .4s;}
.top-stat-fill.hp{background:linear-gradient(90deg,#aa3333,#e85555);}
.top-stat-fill.st{background:linear-gradient(90deg,#aa7722,#e8aa44);}
.top-stat-label{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.coins-display{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:var(--gold2);}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:12px;position:relative;z-index:1;}
#content::-webkit-scrollbar{width:3px;}
#content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* NAV */
#nav{display:grid;grid-template-columns:repeat(5,1fr);
  background:linear-gradient(0deg,#0a0812,var(--bg2));border-top:1px solid var(--border);flex-shrink:0;}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:8px 4px;cursor:pointer;transition:all .15s;
  border:none;background:transparent;color:var(--text3);
  font-family:'Crimson Pro',serif;font-size:9px;letter-spacing:.5px;}
.nav-btn:hover,.nav-btn.active{color:var(--gold2);}
.nav-btn.active{background:rgba(201,168,76,0.07);}
.nav-icon{font-size:20px;transition:transform .15s;}
.nav-btn.active .nav-icon{transform:scale(1.1);}

/* PANELS */
.panel{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.panel-title{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);
  letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.panel-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 16px;border-radius:7px;border:none;cursor:pointer;
  font-family:'Crimson Pro',serif;font-size:13px;font-weight:600;transition:all .15s;letter-spacing:.3px;}
.btn-gold{background:linear-gradient(135deg,#a07830,#c9a84c,#e8c96a);color:#0c0a0f;
  box-shadow:0 2px 8px rgba(201,168,76,0.3);}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-blue{background:linear-gradient(135deg,#2a4a88,#4c7ac9);color:#fff;}
.btn-red{background:linear-gradient(135deg,#882a2a,#c94c4c);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-full{width:100%;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}

/* TITLE */
#screen-title{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;text-align:center;}
.game-logo{font-family:'Cinzel',serif;font-size:32px;color:var(--gold2);
  text-shadow:0 0 30px rgba(201,168,76,.4);font-weight:700;line-height:1.2;margin-bottom:6px;}
.game-subtitle{font-size:13px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:40px;}

/* CLASS SELECT */
.class-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.class-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:12px;cursor:pointer;transition:all .18s;text-align:center;}
.class-card:hover,.class-card.selected{border-color:var(--gold);background:rgba(201,168,76,.06);}
.class-card.selected{box-shadow:0 0 12px rgba(201,168,76,.2);}
.class-icon{font-size:28px;margin-bottom:4px;}
.class-name{font-family:'Cinzel',serif;font-size:12px;color:var(--gold2);margin-bottom:4px;}
.class-desc{font-size:10px;color:var(--text3);line-height:1.4;}
.class-tags{display:flex;gap:3px;justify-content:center;margin-top:5px;flex-wrap:wrap;}
.tag{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:600;letter-spacing:.3px;}
.tag-str{background:rgba(232,106,106,.15);color:var(--red2);}
.tag-mag{background:rgba(106,154,232,.15);color:var(--blue2);}
.tag-heal{background:rgba(106,202,138,.15);color:var(--green2);}
.tag-agi{background:rgba(170,106,232,.15);color:var(--purple2);}
.tag-luck{background:rgba(201,168,76,.15);color:var(--gold2);}

/* STAT ROWS */
.stat-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.stat-icon{font-size:14px;width:20px;text-align:center;}
.stat-name{font-size:11px;color:var(--text2);width:28px;flex-shrink:0;}
.stat-bar-wrap{flex:1;height:8px;background:#1a1625;border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.stat-bar-fill{height:100%;border-radius:4px;transition:width .4s;}
.stat-bar-fill.hp-bar{background:linear-gradient(90deg,#aa3333,#e85555);}
.stat-bar-fill.atk-bar{background:linear-gradient(90deg,#aa6622,#e8aa44);}
.stat-bar-fill.def-bar{background:linear-gradient(90deg,#3366aa,#5599ee);}
.stat-bar-fill.spd-bar{background:linear-gradient(90deg,#6633aa,#aa55ee);}
.stat-bar-fill.luk-bar{background:linear-gradient(90deg,#33aa66,#55ee88);}
.stat-val{font-size:12px;color:var(--text);font-weight:600;min-width:30px;text-align:right;}
.stat-btn-row{display:flex;gap:3px;}
.stat-adj{width:22px;height:22px;border-radius:4px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .1s;}
.stat-adj:hover{border-color:var(--gold);color:var(--gold);}
.stat-boost-tag{font-size:9px;color:var(--gold2);background:rgba(201,168,76,.15);
  padding:1px 5px;border-radius:3px;margin-left:2px;font-weight:700;}

/* QUEST */
.quest-card{background:var(--bg3);border:1px solid var(--border);border-radius:9px;
  padding:11px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:all .15s;}
.quest-card:hover{border-color:var(--border2);}
.quest-card.locked{opacity:.45;cursor:not-allowed;}
.quest-icon{font-size:24px;flex-shrink:0;}
.quest-info{flex:1;}
.quest-name{font-family:'Cinzel',serif;font-size:12px;color:var(--gold2);margin-bottom:2px;}
.quest-desc{font-size:10px;color:var(--text3);}
.quest-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
.quest-cost{font-size:10px;color:var(--stamina-col);font-weight:600;}
.quest-rec{font-size:10px;color:var(--text3);}
.quest-reward{font-size:10px;color:var(--green2);}
.quest-badge{padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.5px;flex-shrink:0;}
.badge-clear{background:rgba(76,170,106,.15);color:var(--green2);border:1px solid rgba(76,170,106,.3);}
.badge-new{background:rgba(232,106,106,.15);color:var(--red2);border:1px solid rgba(232,106,106,.3);}
.badge-lock{background:rgba(100,100,100,.15);color:#666;border:1px solid #333;}

/* BATTLE */
#battle-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:16px;min-height:360px;display:flex;flex-direction:column;gap:12px;}
.battle-stage{display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(135deg,#0f0c1a,#1a1530);
  border-radius:8px;padding:14px;border:1px solid var(--border);min-height:120px;}
.combatant{display:flex;flex-direction:column;align-items:center;gap:6px;width:44%;}
.combatant-icon{font-size:42px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.6));}
.combatant-name{font-family:'Cinzel',serif;font-size:11px;color:var(--text2);}
.combatant-hp{width:100%;}
.chp-track{width:100%;height:8px;background:#111;border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.chp-fill{height:100%;border-radius:4px;transition:width .5s ease;}
.chp-fill.player{background:linear-gradient(90deg,#aa3333,#e86a6a);}
.chp-fill.enemy{background:linear-gradient(90deg,#884400,#cc6600);}
.chp-num{font-size:9px;color:var(--text3);text-align:center;margin-top:2px;}
.vs-label{font-family:'Cinzel',serif;font-size:18px;color:var(--border2);}
.battle-log{background:#0a0812;border:1px solid var(--border);border-radius:7px;
  padding:10px;height:130px;overflow-y:auto;font-size:11px;display:flex;flex-direction:column;gap:3px;}
.battle-log::-webkit-scrollbar{width:2px;}
.battle-log::-webkit-scrollbar-thumb{background:var(--border2);}
.log-line{line-height:1.5;padding:1px 0;}
.log-atk{color:var(--red2);}
.log-def{color:var(--blue2);}
.log-heal{color:var(--green2);}
.log-sys{color:var(--gold);}
.log-loot{color:var(--purple2);}
.battle-actions{display:flex;gap:8px;}

/* EQUIP */
.equip-slots{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.equip-slot{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:8px;cursor:pointer;transition:all .15s;min-height:56px;}
.slot-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.slot-item{font-size:11px;color:var(--gold2);}
.slot-empty{font-size:11px;color:var(--text3);font-style:italic;}
.slot-stats{font-size:9px;color:var(--text2);margin-top:2px;}
.item-list{display:flex;flex-direction:column;gap:6px;}
.item-row{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:10px;display:flex;align-items:center;gap:10px;transition:all .15s;}
.item-icon{font-size:22px;flex-shrink:0;}
.item-info{flex:1;}
.item-name{font-size:12px;color:var(--text);font-weight:600;margin-bottom:2px;}
.item-stats{font-size:10px;color:var(--text2);}
.item-rarity{font-size:9px;font-weight:700;letter-spacing:.5px;}
.rarity-common{color:#888;}.rarity-uncommon{color:var(--green2);}
.rarity-rare{color:var(--blue2);}.rarity-epic{color:var(--purple2);}
.rarity-legendary{color:var(--gold2);text-shadow:0 0 6px rgba(201,168,76,.5);}
.item-actions{display:flex;gap:4px;flex-shrink:0;}

/* SHOP */
.shop-item{background:var(--bg3);border:1px solid var(--border);border-radius:9px;
  padding:11px;margin-bottom:7px;display:flex;align-items:center;gap:10px;}
.shop-price{font-size:12px;color:var(--gold2);font-weight:700;white-space:nowrap;}

/* TOAST */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);
  background:var(--panel2);border:1px solid var(--border2);border-radius:8px;
  padding:8px 18px;font-size:12px;color:var(--text);z-index:500;
  animation:toastIn .25s,toastOut .25s 1.75s forwards;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.5);}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-8px);}to{opacity:1;transform:translate(-50%,0);}}
@keyframes toastOut{to{opacity:0;transform:translate(-50%,-8px);}}

/* MISC */
.exp-row{margin-bottom:10px;}
.exp-label{font-size:10px;color:var(--text3);margin-bottom:3px;display:flex;justify-content:space-between;}
.exp-track{height:6px;background:#1a1625;border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.exp-fill{height:100%;background:linear-gradient(90deg,#5533aa,#8855ee);border-radius:3px;transition:width .5s;}
.section-sub{font-size:11px;color:var(--text3);margin-bottom:8px;}
.empty-state{text-align:center;padding:30px;color:var(--text3);font-size:12px;}
.evolve-ready{animation:glow 1.5s infinite alternate;}
@keyframes glow{from{box-shadow:0 0 5px rgba(201,168,76,.2);}to{box-shadow:0 0 15px rgba(201,168,76,.5),0 0 30px rgba(201,168,76,.2);}}
.special-tag{font-size:9px;color:var(--purple2);background:rgba(138,76,201,.15);
  padding:1px 5px;border-radius:3px;font-weight:700;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar" style="display:none">
    <div id="char-mini">
      <div id="char-icon">⚔️</div>
      <div id="char-info">
        <div id="char-name">—</div>
        <div id="char-class">—</div>
      </div>
    </div>
    <div id="top-stats">
      <div class="top-stat">
        <div class="top-stat-bar"><div id="topbar-hp" class="top-stat-fill hp" style="width:100%"></div></div>
        <div class="top-stat-label">HP</div>
      </div>
      <div class="top-stat">
        <div class="top-stat-bar"><div id="topbar-st" class="top-stat-fill st" style="width:100%"></div></div>
        <div class="top-stat-label">⚡ST</div>
      </div>
      <div class="coins-display">💰<span id="topbar-coins">0</span></div>
    </div>
  </div>
  <div id="content"></div>
  <nav id="nav" style="display:none">
    <button class="nav-btn active" data-screen="status" onclick="showScreen('status')"><span class="nav-icon">📊</span><span>ステータス</span></button>
    <button class="nav-btn" data-screen="quest" onclick="showScreen('quest')"><span class="nav-icon">⚔️</span><span>クエスト</span></button>
    <button class="nav-btn" data-screen="equip" onclick="showScreen('equip')"><span class="nav-icon">🛡️</span><span>装備</span></button>
    <button class="nav-btn" data-screen="shop" onclick="showScreen('shop')"><span class="nav-icon">🏪</span><span>ショップ</span></button>
    <button class="nav-btn" data-screen="class" onclick="showScreen('class')"><span class="nav-icon">✨</span><span>職業</span></button>
  </nav>
</div>
<script>
// ══════════════════════════════════════════════════
//  CLASS TREE
//  boost: ステポイント2倍になるステータス一覧
// ══════════════════════════════════════════════════
const CLASS_TREE = {
  // ── Tier 0 Base ──
  swordsman:  {name:'剣士',  icon:'⚔️', tier:0,desc:'バランス型の戦士',tags:['str'],
    growth:{hp:7,atk:4,def:4,spd:2,luk:2},base:{hp:80,atk:12,def:8,spd:6,luk:4},
    boost:['atk','def'], evolve1:['knight','hero'],skill:'斬撃'},
  mage:       {name:'魔法使い',icon:'🧙',tier:0,desc:'魔法で大ダメージ',tags:['mag'],
    growth:{hp:3,atk:7,def:2,spd:4,luk:3},base:{hp:50,atk:18,def:4,spd:8,luk:5},
    boost:['atk','spd'], evolve1:['sage','sorcerer'],skill:'魔法弾'},
  cleric:     {name:'僧侶',  icon:'🙏',tier:0,desc:'回復と支援に特化',tags:['heal'],
    growth:{hp:5,atk:2,def:4,spd:2,luk:5},base:{hp:65,atk:7,def:9,spd:5,luk:8},
    boost:['luk','def'], evolve1:['paladin','archpriest'],skill:'回復'},
  thief:      {name:'盗賊',  icon:'🗡️',tier:0,desc:'素早く急所を狙う',tags:['agi','luck'],
    growth:{hp:4,atk:5,def:2,spd:6,luk:5},base:{hp:55,atk:14,def:5,spd:12,luk:8},
    boost:['atk','spd'], evolve1:['ninja','pirate'],skill:'急所突き'},
  archer:     {name:'弓使い',icon:'🏹',tier:0,desc:'遠距離から安全に',tags:['agi'],
    growth:{hp:4,atk:5,def:2,spd:5,luk:4},base:{hp:58,atk:13,def:6,spd:10,luk:6},
    boost:['spd','luk'], evolve1:['hunter','magicArcher'],skill:'連射'},
  // ── Tier 1 (Lv20) ──
  knight:     {name:'騎士',  icon:'🛡️',tier:1,desc:'鉄壁の防御',tags:['str'],
    growth:{hp:9,atk:4,def:7,spd:1,luk:2},base:null,parent:'swordsman',
    boost:['def','hp'],  evolve1:['grandKnight'],skill:'シールドバッシュ'},
  hero:       {name:'勇者',  icon:'🌟',tier:1,desc:'全能力が高い',tags:['str','luck'],
    growth:{hp:7,atk:6,def:5,spd:4,luk:5},base:null,parent:'swordsman',
    boost:['atk','luk'], evolve1:['legendHero'],skill:'勇者の一撃'},
  sage:       {name:'賢者',  icon:'📖',tier:1,desc:'全魔法が使える',tags:['mag','heal'],
    growth:{hp:4,atk:8,def:3,spd:4,luk:5},base:null,parent:'mage',
    boost:['atk','luk'], evolve1:['archsage'],skill:'全体魔法'},
  sorcerer:   {name:'黒魔道士',icon:'💀',tier:1,desc:'圧倒的な攻撃魔法',tags:['mag'],
    growth:{hp:3,atk:11,def:2,spd:4,luk:2},base:null,parent:'mage',
    boost:['atk','atk'], evolve1:['demonLord'],skill:'滅却魔法'},
  paladin:    {name:'聖騎士',icon:'⚡',tier:1,desc:'攻防と回復を兼ねる',tags:['str','heal'],
    growth:{hp:7,atk:5,def:6,spd:2,luk:6},base:null,parent:'cleric',
    boost:['def','luk'], evolve1:['holyKnight'],skill:'聖なる一撃'},
  archpriest: {name:'大神官',icon:'🌸',tier:1,desc:'強力な回復',tags:['heal'],
    growth:{hp:6,atk:2,def:4,spd:3,luk:9},base:null,parent:'cleric',
    boost:['luk','hp'],  evolve1:['godPriest'],skill:'聖域'},
  ninja:      {name:'忍者',  icon:'🌑',tier:1,desc:'最速・最高の回避',tags:['agi'],
    growth:{hp:4,atk:6,def:2,spd:10,luk:5},base:null,parent:'thief',
    boost:['spd','atk'], evolve1:['shadowMaster'],skill:'分身'},
  pirate:     {name:'海賊',  icon:'🏴‍☠️',tier:1,desc:'略奪で高い金獲得',tags:['luck','str'],
    growth:{hp:6,atk:7,def:3,spd:4,luk:8},base:null,parent:'thief',
    boost:['luk','atk'], evolve1:['pirateKing'],skill:'略奪'},
  hunter:     {name:'狩人',  icon:'🦅',tier:1,desc:'弱点特攻で高ダメージ',tags:['agi'],
    growth:{hp:5,atk:7,def:3,spd:6,luk:5},base:null,parent:'archer',
    boost:['atk','spd'], evolve1:['beastLord'],skill:'弱点特攻'},
  magicArcher:{name:'魔弓士',icon:'🌠',tier:1,desc:'魔法の矢で貫通攻撃',tags:['mag','agi'],

let P=null, currentScreen='title', battleState=null;

function newPlayer(name,classId){
  const cls=CLASS_TREE[classId];
  const base=cls.base;
  return {
    name,classId,level:1,exp:0,expNext:80,
    hp:base.hp,maxHp:base.hp,
    stamina:10,maxStamina:10,coins:100,
    stats:{hp:base.hp,atk:base.atk,def:base.def,spd:base.spd,luk:base.luk},
    freePoints:0,
    equipped:{weapon:null,armor:null,acc:null},
    inventory:[],cleared:[],
    staminaTimer:Date.now(),
  };
}

// 実効ステータス（装備込み）
function getStats(){
  const s={...P.stats};
  for(const sl of ['weapon','armor','acc']){
    const it=ITEMS[P.equipped[sl]];
    if(!it)continue;
    for(const k of ['atk','def','spd','luk']){if(it[k])s[k]=(s[k]||0)+it[k];}
  }
  return s;
}
function getClass(){return CLASS_TREE[P.classId];}

// ステポイント消費：boost対象ステは2倍
function allocStat(key,delta){
  if(delta>0&&P.freePoints<=0)return;
  const cls=getClass();
  const isBoosted=cls.boost&&cls.boost.includes(key);
  const gain=isBoosted?2*delta:delta;
  // 下限チェック
  const minVal=CLASS_TREE[P.classId].base?.[key]??1;
  if(delta<0&&P.stats[key]<=minVal)return;
  P.stats[key]+=gain;
  if(key==='hp'){P.maxHp+=gain*3;P.hp=Math.min(P.hp,P.maxHp);}
  P.freePoints-=delta;
  updateTopbar();renderStatus();
}

// スタミナ自動回復
setInterval(()=>{
  if(!P||P.stamina>=P.maxStamina)return;
  if((Date.now()-P.staminaTimer)/1000>=120){
    P.stamina=Math.min(P.maxStamina,P.stamina+1);
    P.staminaTimer=Date.now();
    updateTopbar();
    if(currentScreen==='quest')renderQuest();
  }
},5000);

function showScreen(id){
  currentScreen=id;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.screen===id));
  ({status:renderStatus,quest:renderQuest,equip:renderEquip,shop:renderShop,class:renderClass})[id]?.();
}

function updateTopbar(){
  if(!P)return;
  const cls=getClass();
  document.getElementById('char-icon').textContent=cls.icon;
  document.getElementById('char-name').textContent=P.name;
  document.getElementById('char-class').textContent=`Lv.${P.level} ${cls.name}`;
  document.getElementById('topbar-hp').style.width=(P.hp/P.maxHp*100)+'%';
  document.getElementById('topbar-st').style.width=(P.stamina/P.maxStamina*100)+'%';
  document.getElementById('topbar-coins').textContent=P.coins.toLocaleString();
}

async function runBattle(questId,skip){
  const q=QUESTS.find(x=>x.id===questId);
  const es=getStats();
  document.getElementById('bact').innerHTML=`<span style="color:var(--text3);font-size:11px;">戦闘中…</span>`;

  let pHp=P.hp,eHp=q.enemy.hp;
  const log=[];
  const logAdd=(msg,cls='')=>{
    log.push({msg,cls});
    if(!skip){
      const el=document.getElementById('blog');
      if(el){el.innerHTML+=`<div class="log-line ${cls}">${msg}</div>`;el.scrollTop=el.scrollHeight;}
    }
  };
  const updateBars=()=>{
    const ph=document.getElementById('php'),eh=document.getElementById('ehp');
    const pn=document.getElementById('phn'),en=document.getElementById('ehn');
    if(ph)ph.style.width=Math.max(0,pHp/P.maxHp*100)+'%';
    if(eh)eh.style.width=Math.max(0,eHp/q.enemy.hp*100)+'%';
    if(pn)pn.textContent=`${Math.max(0,Math.round(pHp))}/${P.maxHp}`;
    if(en)en.textContent=`${Math.max(0,Math.round(eHp))}/${q.enemy.hp}`;
  };
  const delay=ms=>new Promise(r=>setTimeout(r,ms));

  // 特殊効果フラグ
  const hasAngelicArmor=P.equipped.armor==='angelicArmor'||P.equipped.armor==='godArmor';
  const hasSoulEdge=P.equipped.weapon==='soulEdge';
  const hasIgnis=P.equipped.acc==='ignisShard';
  const hasDemonCore=P.equipped.acc==='demonCore';
  const hasChaosCore=P.equipped.acc==='chaosCore';
  const hasDragonFang=P.equipped.acc==='dragonFang';
  const hasDeepSea=P.equipped.acc==='deepSeaRing';
  const hasRogueBoots=P.equipped.acc==='rogueBoots';
  const hasFlameSword=P.equipped.weapon==='flameSword';
  const hasFlameOrVoid=P.equipped.weapon==='flameSword'||P.equipped.weapon==='voidSword';

  let baseAtk=es.atk;
  if(hasIgnis||hasDemonCore)baseAtk=Math.floor(baseAtk*(hasIgnis?1.1:1.15));
  if(hasChaosCore)baseAtk=Math.floor(baseAtk*1.1);

  const healClasses=['cleric','archpriest','paladin','godPriest','holyKnight'];
  const isHealer=healClasses.includes(P.classId);

  let round=0;
  while(pHp>0&&eHp>0){
    round++;
    if(round>100){logAdd('長期戦！引き分け…','log-sys');break;}

    // 素早さによる先手判定
    const goFirst=es.spd>=q.enemy.atk*0.8;

    // ─ プレイヤー攻撃 ─
    let pAtk=Math.max(1,baseAtk-Math.floor(q.enemy.def*0.45)+Math.floor(Math.random()*5-2));
    if(hasFlameOrVoid)pAtk=Math.floor(pAtk*1.12);
    const critRate=es.luk*0.5+3+(hasDragonFang?15:0)+(hasDeepSea?10:0);
    const crit=Math.random()*100<critRate;
    if(crit){pAtk=Math.floor(pAtk*1.9);logAdd(`🌟 クリティカル！ ${q.enemy.name}に ${pAtk} ダメージ！`,'log-atk');}
    else logAdd(`あなたの攻撃！ ${q.enemy.name}に ${pAtk} ダメージ`,'log-atk');

    // 魂喰らい特殊
    if(hasSoulEdge){
      const dot=Math.floor(eHp*0.03);
      eHp-=dot;logAdd(`💀 魂喰らい: ${dot} 追加ダメ`,'log-atk');
    }
    eHp-=pAtk;
    if(!skip){updateBars();await delay(280);}
    if(eHp<=0)break;

    // ─ 天使・神鎧 自動回復 ─
    if(hasAngelicArmor){
      const regen=Math.floor(P.maxHp*0.03);
      pHp=Math.min(P.maxHp,pHp+regen);
      logAdd(`👼 自動回復 +${regen} HP`,'log-heal');
    }

    // ─ 敵攻撃 ─
    let eAtk=Math.max(1,q.enemy.atk-Math.floor(es.def*0.45)+Math.floor(Math.random()*5-2));
    // 被ダメ軽減（竜鱗・神の鎧）
    if(P.equipped.armor==='dragonArmor'||P.equipped.armor==='godArmor')eAtk=Math.floor(eAtk*0.87);
    // 回避（SPD）
    const dodgeRate=es.spd*0.35+(hasRogueBoots?20:0);
    if(Math.random()*100<dodgeRate){
      logAdd(`💨 回避！ ${q.enemy.name}の攻撃をかわした`,'log-def');
    } else {
      pHp-=eAtk;
      logAdd(`${q.enemy.name}の攻撃！ あなたに ${eAtk} ダメージ`,'');
    }

    // ─ 回復職スキル ─
    if(isHealer&&round%3===0){
      const heal=Math.floor(es.luk*2+15);
      pHp=Math.min(P.maxHp,pHp+heal);
      logAdd(`💚 ${getClass().skill}で ${heal} HP回復！`,'log-heal');
    }

    if(!skip){updateBars();await delay(280);}
  }

  if(skip)updateBars();
  const won=eHp<=0;
  P.hp=Math.max(1,Math.round(pHp));

  if(won){
    const expGain=q.exp;
    const goldGain=q.gold+Math.floor(Math.random()*q.gold*0.25);
    P.exp+=expGain;P.coins+=goldGain;

    // ドロップ判定（ドロップ品はshopアイテムより確率調整）
    const drops=[];
    q.drops.forEach(itemId=>{
      const it=ITEMS[itemId];
      if(!it)return;
      const rate=it.rarity==='legendary'?0.12:it.rarity==='epic'?0.22:it.rarity==='rare'?0.35:0.5;
      if(Math.random()<rate){P.inventory.push(itemId);drops.push(it.name);}
    });

    logAdd('','');
    logAdd('✅ 勝利！','log-sys');
    logAdd(`EXP +${expGain}  💰 +${goldGain}`,'log-sys');
    if(drops.length)logAdd(`💎 ドロップ: ${drops.join('、')}`,'log-loot');
    if(!P.cleared.includes(q.id))P.cleared.push(q.id);

    // レベルアップ（無制限）
    while(P.exp>=P.expNext){
      P.exp-=P.expNext;
      P.level++;
      P.expNext=Math.floor(P.expNext*1.28+P.level*10);
      const g=CLASS_TREE[P.classId].growth;
      P.stats.hp+=g.hp; P.maxHp+=g.hp*3;
      P.stats.atk+=g.atk;P.stats.def+=g.def;
      P.stats.spd+=g.spd;P.stats.luk+=g.luk;
      P.hp=P.maxHp;
      P.freePoints+=3;
      logAdd(`🎉 Lv.${P.level} に上がった！（+3ポイント）`,'log-sys');
      if(P.level===20||P.level===40)logAdd('⭐ 職業進化が解放！ 職業タブを確認！','log-sys');
    }
  } else {
    logAdd('','');
    logAdd('💀 敗北… HPが尽きた','log-sys');
    const consolExp=Math.floor(q.exp*0.15);
    P.exp+=consolExp;logAdd(`EXP +${consolExp}（敗北ボーナス）`,'log-sys');
    P.hp=Math.floor(P.maxHp*0.3);
  }

  updateTopbar();
  const ae=document.getElementById('bact');
  if(ae)ae.innerHTML=`<button class="btn btn-${won?'gold':'red'} btn-full" onclick="showScreen('quest')">
    ${won?'✅ クエスト完了':'💀 リタイア'} → クエスト一覧へ
  </button>`;

  if(skip){
    const le=document.getElementById('blog');
    if(le){le.innerHTML=log.map(l=>`<div class="log-line ${l.cls}">${l.msg||'　'}</div>`).join('');le.scrollTop=le.scrollHeight;}
  }
}

function equipItem(itemId){
  const it=ITEMS[itemId];if(!it)return;
  P.equipped[it.slot]=itemId;updateTopbar();renderEquip();toast(`${it.name} を装備！`);
}
function unequipItem(slot){P.equipped[slot]=null;updateTopbar();renderEquip();}
function sellItem(itemId){
  const idx=P.inventory.indexOf(itemId);if(idx<0)return;
  P.inventory.splice(idx,1);
  const price=Math.floor((ITEMS[itemId].price||50)*0.4);
  P.coins+=price;updateTopbar();renderEquip();
  toast(`${ITEMS[itemId].name}を売却 (+${price}G)`);
}

      :cls.tier===1?`<div style="font-size:11px;color:var(--text2);">
        → <span style="color:var(--gold2)">${cls.evolve1.map(id=>CLASS_TREE[id]?.name||'???').join(' / ')}</span>
        <span style="color:var(--text3);">（Lv.40）</span></div>`
      :`<div style="font-size:11px;color:var(--green2);">🌟 最終形態に到達！</div>`}
    </div>`}

    <div class="panel">
      <div class="panel-title">📜 全職業ツリー</div>
      ${BASE_CLASSES.map(bid=>{
        const bc=CLASS_TREE[bid];
        return `<div style="margin-bottom:10px;">
          <span style="font-size:15px;">${bc.icon}</span>
          <span style="font-family:'Cinzel',serif;font-size:12px;color:${P.classId===bid?'var(--gold2)':'var(--text2)'};">${bc.name}</span>
          <div style="padding-left:20px;font-size:10px;color:var(--text3);margin-top:2px;">
            ${bc.evolve1.map(e1id=>{
              const e1=CLASS_TREE[e1id];
              return `→<span style="color:${P.classId===e1id?'var(--gold2)':'var(--text3)'};">${e1.icon}${e1.name}</span>
              ${e1.evolve1.map(e2id=>{const e2=CLASS_TREE[e2id];
                return ` →<span style="color:${P.classId===e2id?'var(--gold2)':'var(--text3)'};">${e2.icon}${e2.name}</span>`;
              }).join('')}　`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function evolveClass(newId){
  if(!confirm(`${CLASS_TREE[newId].name}に進化しますか？`))return;
  P.classId=newId;
  const ng=CLASS_TREE[newId].growth;
  P.stats.hp+=ng.hp*3; P.maxHp+=ng.hp*9; P.hp=P.maxHp;
  P.stats.atk+=ng.atk*2;P.stats.def+=ng.def*2;
  P.stats.spd+=ng.spd*2;P.stats.luk+=ng.luk*2;
  P.freePoints+=5;
  updateTopbar();renderClass();toast(`✨ ${CLASS_TREE[newId].name} に進化！`);
}

// ══════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════
function statLine(it){
  const p=[];
  if(it.atk)p.push(`ATK+${it.atk}`);
  if(it.def)p.push(`DEF+${it.def}`);
  if(it.spd)p.push(`SPD${it.spd>=0?'+':''}${it.spd}`);
  if(it.luk)p.push(`LUK+${it.luk}`);
  return p.join(' ')||'—';
}

function toast(msg){
  const el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2100);
}

renderTitle();
</script>
</body>
</html>
